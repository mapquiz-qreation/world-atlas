<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WorldAtlas</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f1ea; color: #3e2723; margin: 0; padding: 10px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        h1 { font-size: 20px; margin: 0 0 10px 0; text-align: center; letter-spacing: 2px; }
        #main-layout { display: flex; gap: 15px; flex: 1; align-items: flex-start; justify-content: center; }

        /* 時代・地域別テーマ（色のみ上書き。枠は共通の騎士風を継承） */

        /* 古代：砂色と焦茶（石板風） */
        body[data-era="ancient"] { background-color: #f5ecd8; color: #4a3526; }
        body[data-era="ancient"] #user-panel,
        body[data-era="ancient"] #admin-panel,
        body[data-era="ancient"] #question-box { background: #fbf3dd; border-color: #6d4c41; }
        body[data-era="ancient"] #ranking-list { background: #fffaf0; border-color: #8d6e63; color: #4a3526; }
        body[data-era="ancient"] .section-label { background: linear-gradient(to right, #8d6e63, #5d4037); color: #fffaf0; }
        body[data-era="ancient"] #q-text { color: #5d4037; }
        body[data-era="ancient"] .mode-btn,
        body[data-era="ancient"] .era-btn { background: #e0c9a6; border-color: #6d4c41; color: #4a3526; }
        body[data-era="ancient"] .mode-btn.active,
        body[data-era="ancient"] .era-btn.active { background: #6d4c41; color: #fffaf0; border-color: #5d4037; }
        body[data-era="ancient"] #next-btn,
        body[data-era="ancient"] .score-badge { background: #6d4c41; color: #fffaf0; }
        body[data-era="ancient"] #map-container { background: #f2e4c8; border-color: #6d4c41; }

        /* 中世（ヨーロッパ）：ロイヤルブルー・クリムゾン・金（騎士の紋章風） */
        body[data-era="medieval"] { background-color: #0a2d5c; color: #FFFFFF; }
        body[data-era="medieval"] #user-panel,
        body[data-era="medieval"] #admin-panel,
        body[data-era="medieval"] #question-box { background: #0D47A1; color: #FFFFFF; border-color: #B0BEC5; }
        body[data-era="medieval"] #ranking-list { background: #0D47A1; border-color: #B0BEC5; color: #FFFFFF; }
        body[data-era="medieval"] #ranking-title { color: #FFFFFF; }
        body[data-era="medieval"] .section-label { background: linear-gradient(to right, #D32F2F, #0D47A1); color: #FFFFFF; }
        body[data-era="medieval"] #q-text { color: #FFFFFF; }
        body[data-era="medieval"] .mode-btn,
        body[data-era="medieval"] .era-btn { background: #1565C0; border-color: #B0BEC5; color: #FFFFFF; }
        body[data-era="medieval"] .mode-btn.active,
        body[data-era="medieval"] .era-btn.active { background: #D32F2F; color: #FFD700; border-color: #B0BEC5; }
        body[data-era="medieval"] #next-btn,
        body[data-era="medieval"] .score-badge { background: #D32F2F; color: #FFD700; }
        body[data-era="medieval"] #map-container { background: #0a2d5c; border-color: #B0BEC5; }

        /* 近代（ヨーロッパ）：クールなグレー＋ダークネイビー */
        body[data-era="modern"] { background-color: #eceff1; color: #263238; }
        body[data-era="modern"] #user-panel,
        body[data-era="modern"] #admin-panel,
        body[data-era="modern"] #question-box { background: #ffffff; border-color: #37474f; }
        body[data-era="modern"] #ranking-list { background: #fafafa; border-color: #90a4ae; }
        body[data-era="modern"] .section-label { background: linear-gradient(to right, #546e7a, #37474f); color: #eceff1; }
        body[data-era="modern"] #q-text { color: #1e3a5f; }
        body[data-era="modern"] .mode-btn,
        body[data-era="modern"] .era-btn { background: #cfd8dc; border-color: #455a64; color: #263238; }
        body[data-era="modern"] .mode-btn.active,
        body[data-era="modern"] .era-btn.active { background: #263238; color: #e0f7fa; border-color: #37474f; }
        body[data-era="modern"] #next-btn,
        body[data-era="modern"] .score-badge { background: #263238; color: #e0f7fa; }
        body[data-era="modern"] #map-container { background: #eceff1; border-color: #37474f; }

        /* 中東：ターコイズとゴールド（タイル装飾風） */
        body[data-era="islamic_expansion"],
        body[data-era="turco_mongol"] { background-color: #e0f7fa; color: #004d40; }
        body[data-era="islamic_expansion"] #user-panel,
        body[data-era="islamic_expansion"] #admin-panel,
        body[data-era="islamic_expansion"] #question-box,
        body[data-era="turco_mongol"] #user-panel,
        body[data-era="turco_mongol"] #admin-panel,
        body[data-era="turco_mongol"] #question-box { background: #fff8e1; border-color: #c49b47; }
        body[data-era="islamic_expansion"] #ranking-list,
        body[data-era="turco_mongol"] #ranking-list { background: #fdf4da; border-color: #c49b47; color: #4a3420; }
        body[data-era="islamic_expansion"] .section-label,
        body[data-era="turco_mongol"] .section-label { background: linear-gradient(to right, #00796b, #c49b47); color: #fffde7; }
        body[data-era="islamic_expansion"] #q-text,
        body[data-era="turco_mongol"] #q-text { color: #00695c; }
        body[data-era="islamic_expansion"] .mode-btn,
        body[data-era="islamic_expansion"] .era-btn,
        body[data-era="turco_mongol"] .mode-btn,
        body[data-era="turco_mongol"] .era-btn { background: #b2ebf2; border-color: #c49b47; color: #004d40; }
        body[data-era="islamic_expansion"] .mode-btn.active,
        body[data-era="islamic_expansion"] .era-btn.active,
        body[data-era="turco_mongol"] .mode-btn.active,
        body[data-era="turco_mongol"] .era-btn.active { background: #00796b; color: #ffd54f; border-color: #c49b47; }
        body[data-era="islamic_expansion"] #next-btn,
        body[data-era="islamic_expansion"] .score-badge,
        body[data-era="turco_mongol"] #next-btn,
        body[data-era="turco_mongol"] .score-badge { background: #c49b47; color: #fffaf0; }
        body[data-era="islamic_expansion"] #map-container,
        body[data-era="turco_mongol"] #map-container { background: radial-gradient(circle at 30% 30%, #b2ebf2 0, #e0f7fa 50%, #fff8e1 100%); border-color: #c49b47; }

        /* インド：サフランオレンジとマゼンタ（極彩色風） */
        body[data-region="india"] { background: radial-gradient(circle at top, #ffe082 0, #fff3e0 50%, #ffe0b2 100%); color: #4e342e; }
        body[data-region="india"] #user-panel,
        body[data-region="india"] #admin-panel,
        body[data-region="india"] #question-box { background: #fff8e1; border-color: #ff8f00; }
        body[data-region="india"] #ranking-list { background: #fff3e0; border-color: #d81b60; color: #4e342e; }
        body[data-region="india"] .section-label { background: linear-gradient(to right, #ff8f00, #d81b60); color: #fffde7; }
        body[data-region="india"] #q-text { color: #e65100; }
        body[data-region="india"] .mode-btn,
        body[data-region="india"] .era-btn { background: linear-gradient(135deg, #ffb74d, #f06292); border-color: #d81b60; color: #fff8e1; }
        body[data-region="india"] .mode-btn.active,
        body[data-region="india"] .era-btn.active { background: linear-gradient(135deg, #e65100, #ad1457); border-color: #6a1b9a; color: #fffde7; }
        body[data-region="india"] #next-btn,
        body[data-region="india"] .score-badge { background: #ff6f00; color: #fffde7; }
        body[data-region="india"] #map-container { background: radial-gradient(circle at 20% 20%, #f8bbd0 0, #ffe082 40%, #ffb74d 100%); border-color: #d81b60; }

        /* 中国：朱色と黄金（紫禁城風） */
        body[data-region="china"] { background-color: #3e0808; color: #ffecb3; }
        body[data-region="china"] #user-panel,
        body[data-region="china"] #admin-panel,
        body[data-region="china"] #question-box { background: #4a0f0f; border-color: #fbc02d; }
        body[data-region="china"] #ranking-list { background: #2b0505; border-color: #fbc02d; color: #ffecb3; }
        body[data-region="china"] .section-label { background: linear-gradient(to right, #b71c1c, #fbc02d); color: #3e2723; }
        body[data-region="china"] #q-text { color: #ffeb3b; }
        body[data-region="china"] .mode-btn,
        body[data-region="china"] .era-btn { background: #b71c1c; border-color: #fbc02d; color: #ffecb3; }
        body[data-region="china"] .mode-btn.active,
        body[data-region="china"] .era-btn.active { background: #d32f2f; border-color: #ffd54f; color: #fff8e1; }
        body[data-region="china"] #next-btn,
        body[data-region="china"] .score-badge { background: #b71c1c; color: #fff8e1; }
        body[data-region="china"] #map-container { background: radial-gradient(circle at 15% 20%, #fbc02d 0, #4a0f0f 50%, #2b0505 100%); border-color: #fbc02d; }

        /* 東南アジア：深緑とオレンジ（ジャングル・仏教風） */
        body[data-region="southeast_asia"] { background: radial-gradient(circle at top, #2e7d32 0, #1b5e20 60%, #0d3b16 100%); color: #e8f5e9; }
        body[data-region="southeast_asia"] #user-panel,
        body[data-region="southeast_asia"] #admin-panel,
        body[data-region="southeast_asia"] #question-box { background: rgba(13, 59, 22, 0.95); border-color: #ffa000; }
        body[data-region="southeast_asia"] #ranking-list { background: rgba(27, 94, 32, 0.95); border-color: #ffa000; color: #fffde7; }
        body[data-region="southeast_asia"] .section-label { background: linear-gradient(to right, #1b5e20, #ffa000); color: #fffde7; }
        body[data-region="southeast_asia"] #q-text { color: #ffca28; }
        body[data-region="southeast_asia"] .mode-btn,
        body[data-region="southeast_asia"] .era-btn { background: linear-gradient(135deg, #388e3c, #ffa000); border-color: #ffb300; color: #fffde7; }
        body[data-region="southeast_asia"] .mode-btn.active,
        body[data-region="southeast_asia"] .era-btn.active { background: linear-gradient(135deg, #2e7d32, #f57f17); border-color: #ffb300; color: #fffde7; }
        body[data-region="southeast_asia"] #next-btn,
        body[data-region="southeast_asia"] .score-badge { background: #ffa000; color: #fffde7; }
        body[data-region="southeast_asia"] #map-container { background: radial-gradient(circle at 25% 25%, #a5d6a7 0, #2e7d32 45%, #0d3b16 100%); border-color: #ffa000; }


        /* ===== 共通：騎士風の枠組み（全地域・全時代で使用） ===== */
        #sidebar { width: 300px; display: flex; flex-direction: column; gap: 10px; height: 92vh; overflow-y: auto; padding-right: 5px; border: 4px double #B0BEC5; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

        /* ユーザー・ランキングパネル */
        #user-panel, #admin-panel, #question-box {
            border: 4px double #B0BEC5;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        #user-panel { background: #efebe9; padding: 12px; }
        .score-badge { display: inline-block; background: #5d4037; color: white; padding: 2px 10px; border-radius: 15px; font-weight: bold; }
        #ranking-title { font-weight: bold; font-size: 12px; margin-top: 10px; color: #d32f2f; }
        #ranking-list { font-size: 11px; background: white; padding: 8px; border-radius: 8px; margin-top: 5px; border: 4px double #B0BEC5; min-height: 60px; line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .rank-row { margin: 2px 0; }
        .rank-title-badge { display: inline-block; margin-left: 4px; padding: 1px 6px; font-size: 10px; font-weight: bold; background: linear-gradient(135deg, #ffd54f, #ff8f00); color: #3e2723; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        /* セレクター（地域・時代） */
        .section-label { font-size: 11px; font-weight: bold; margin-bottom: 2px; padding: 4px 8px; border-radius: 6px; color: #5d4037; }
        #mode-selector, #era-selector { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; min-height: 32px; }
        .mode-btn, .era-btn {
            flex: 1; min-width: 70px; padding: 8px 5px; font-size: 11px; cursor: pointer; border-radius: 8px;
            border: 4px double #B0BEC5; background: #d7ccc8; font-weight: bold; transition: 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .mode-btn.active, .era-btn.active { background: #5d4037; color: #fff; transform: translateY(-2px); box-shadow: 0 0 10px rgba(255,215,0,0.35); }

        /* クイズエリア */
        #question-box { background: white; padding: 15px; text-align: center; position: relative; }
        #q-text { display: block; font-size: 22px; font-weight: bold; color: #d32f2f; margin: 10px 0; }
        #result { font-size: 18px; font-weight: bold; min-height: 25px; margin: 5px 0; }
        #next-btn { width: 100%; padding: 10px; background: #5d4037; color: white; border: none; border-radius: 6px; cursor: pointer; display: none; font-weight: bold; font-size: 14px; }

        /* マップエリア */
        #map-container { position: relative; border: 4px double #B0BEC5; border-radius: 8px; background: #e0f2f1; line-height: 0; overflow: hidden; max-height: 80vh; box-shadow: 0 2px 8px rgba(0,0,0,0.12); cursor: grab; touch-action: none; }
        #map-container.dragging { cursor: grabbing; }
        #map-content { position: relative; display: inline-block; transform-origin: 0 0; }
        #map-image { height: 75vh; width: auto; display: block; -webkit-user-drag: none; pointer-events: none; }
        #map-content .target-node { pointer-events: auto; }
        #map-reset-btn { position: absolute; bottom: 10px; right: 10px; z-index: 25; padding: 6px 12px; font-size: 12px; background: rgba(62,39,35,0.9); color: #fff; border: 1px solid #fff; border-radius: 6px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        #map-reset-btn:hover { background: #5d4037; }
        .target-node { position: absolute; width: 20px; height: 20px; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #5d4037; background: white; cursor: pointer; z-index: 5; transition: 0.2s; }
        .target-node.correct { background: #388e3c !important; border-color: #1b5e20 !important; box-shadow: 0 0 10px #388e3c; z-index: 10; }
        .target-node.wrong { background: #d32f2f !important; opacity: 0.6; }
        .target-node.highlight { background: #388e3c !important; border-color: #1b5e20 !important; z-index: 15; animation: pulse-ring 1s infinite; }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(56, 142, 60, 0.7); transform: translate(-50%, -50%) scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(56, 142, 60, 0); transform: translate(-50%, -50%) scale(1.3); }
            100% { box-shadow: 0 0 0 0 rgba(56, 142, 60, 0); transform: translate(-50%, -50%) scale(1); }
        }

        /* 管理モード */
        #admin-panel { font-size: 11px; background: rgba(239, 235, 233, 0.9); padding: 10px; }
        #admin-pin { position: absolute; width: 14px; height: 14px; background: #d32f2f; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; display: none; }
    </style>
</head>
<body>

    <h1>🗺️ WorldAtlas</h1>

    <div id="main-layout">
        <div id="sidebar">
            <!-- ユーザー登録 -->
           <!-- サイドバーの中の user-panel をこれに差し替えて！ -->
<div id="user-panel">
    <!-- ログイン前：ここが表示されるはず！ -->
    <div id="login-form">
        <strong>👤 受験生登録</strong><br>
        <input type="text" id="user-name-input" placeholder="名前を入力" style="width:140px; margin-top:5px; padding:5px;">
        <button onclick="loginUser()" class="mode-btn" style="min-width:60px;">参戦</button>
    </div>

    <!-- ログイン後：最初は隠しておくよ -->
    <div id="user-info-area" style="display:none;">
        ログイン中: <span id="display-name" style="font-weight:bold;"></span><br>
        正解数: <span class="score-badge" id="user-total-score">0</span>
        <hr>
        <div id="ranking-title">🏆 時代別TOP10</div>
        <div id="ranking-list">時代を選択してね</div>
        <button onclick="logoutUser()" style="font-size:10px; margin-top:10px; color:#d32f2f; cursor:pointer; background:none; border:1px solid #d32f2f; border-radius:3px; padding:2px 5px;">ログアウト / ユーザー変更</button>
    </div>
</div>

            <!-- 地域・時代選択（ここに地域ボタン・時代ボタンがJSで入ります） -->
            <div class="section-label">REGION / 地域</div>
            <div id="mode-selector"></div>
            <div class="section-label">ERA / 時代</div>
            <div id="era-selector">地域を先に選んでね</div>

            <!-- クイズ箱 -->
            <div id="question-box">
                <div id="era-display" style="font-size:10px; color:#8d6e63; margin-bottom:5px;">-</div>
                <span id="q-text">Ready?</span>
                <p id="result"></p>
                <button id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
            </div>

            <!-- 管理モード -->
            <div id="admin-panel">
                <details>
                    <summary>🛠️ 座標調整ツール</summary>
                    座標: <strong id="selected-coord" style="color:red;">未選択</strong>
                    <input type="text" id="new-q-text" placeholder="地点名" style="width:90%; margin:5px 0; padding:3px;">
                    <button onclick="addNewQuestion()" style="width:100%;">一時保存</button>
                    <button onclick="exportAllRegions()" style="width:100%; margin:5px 0;">JSON抽出</button>
                    <textarea id="export-area" readonly style="width:95%; height:60px; font-size:9px;"></textarea>
                </details>
            </div>
        </div>

        <!-- マップ -->
        <div id="map-container">
            <div id="map-content">
                <img id="map-image" src="map.png" draggable="false">
                <div id="admin-pin"></div>
                <div id="node-container"></div>
            </div>
            <button type="button" id="map-reset-btn" title="全体表示">全体表示</button>
        </div>
    </div>

    <script>
        // ★君のGASのURLを貼り付けてね！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyyeni58wMFYb8K4xfop2KzjldXr-U5RQQilybUjM_60nUeUR6IdiZoCMoJnP9FSbXD/exec";

        // 地域・時代タグごとの第1位称号
        const TAG_TITLES = {
            "china_ancient_china": "👑 始皇帝",
            "china_medieval_china": "👑 天可汗 (てんかがん)",
            "china_early_modern_china": "👑 総督 (そうとく)",
            "mideast_islamic_expansion": "☪️ 正統カリフ",
            "mideast_turco_mongol": "☪️ スルタン・ハン",
            "europe_ancient": "🏛️ インペラトル",
            "europe_medieval": "🏛️ 教皇 (パパ)",
            "europe_modern": "🏛️ 啓蒙専制君主",
            "india_ancient_medieval_india": "🕉️ 転輪聖王 (てんりんじょうおう)",
            "india_mughal_colonial": "🕉️ パードシャー",
            "southeast_asia_ancient": "🌴 諸王の王",
            "southeast_asia_colonial": "🌴 海域の覇者"
        };

        let masterData = {}, currentUser = null, currentRegion = '', currentEra = '', questions = [], currentIdx = 0, isAnswered = false, lastClickedPos = null;
        // 地図ズーム・ドラッグ用
        let mapScale = 1, mapTranslateX = 0, mapTranslateY = 0;
        let mapDragging = false, mapDragStartX = 0, mapDragStartY = 0, mapDragStartTx = 0, mapDragStartTy = 0, mapJustDragged = false;

        // ランキング受信 (時代別タグ対応)
        window.receiveRanking = function(scores) {
            const list = document.getElementById("ranking-list");
            if (!Array.isArray(scores) || scores.length === 0) {
                list.innerHTML = "この時代のデータはまだないよ！";
                return;
            }
            // 時代タグ(例: europe_ancient)でフィルタリング
            const tag = `${currentRegion}_${currentEra}`;
            const filtered = scores.filter(s => s.tag === tag).sort((a, b) => b.score - a.score);

            if(filtered.length === 0) {
                list.innerHTML = "この時代の挑戦者は君が初めてかも！";
            } else {
                const titleForTag = TAG_TITLES[tag] || "";
                list.innerHTML = filtered.slice(0, 10).map((s, i) => {
                    const isFirst = i === 0;
                    const badge = isFirst && titleForTag ? ` <span class="rank-title-badge">${titleForTag}</span>` : "";
                    return `<div class="rank-row">${i+1}位: ${s.name}${badge} (${s.score}点)</div>`;
                }).join("");
            }

            // 自分のスコア更新
            if (currentUser) {
                const myData = scores.find(s => s.name === currentUser && s.tag === tag);
                if (myData) {
                    localStorage.setItem(`score_${currentUser}_${tag}`, myData.score);
                    updateScoreUI();
                }
            }
        };

        async function fetchQuestions() {
            try {
                const res = await fetch('questions.json');
                masterData = await res.json();
                setupRegionButtons();
                checkLocalLogin();
            } catch (e) { console.error("JSON読込失敗"); }
        }

        // 地域ボタン生成
        function setupRegionButtons() {
            const selector = document.getElementById("mode-selector");
            selector.innerHTML = "";
            Object.keys(masterData).forEach(key => {
                const btn = document.createElement("button");
                btn.className = "mode-btn";
                btn.innerText = masterData[key].name;
                btn.id = `btn-${key}`;
                btn.onclick = () => selectRegion(key);
                selector.appendChild(btn);
            });
        }

        // 地域を選択 ➔ 時代ボタンを表示
        function selectRegion(key) {
            currentRegion = key;
            const data = masterData[key];
            document.getElementById("map-image").src = data.img;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${key}`));
            
            const eraSelector = document.getElementById("era-selector");
            eraSelector.innerHTML = "";
            
            Object.keys(data.eras).forEach(eraKey => {
                const btn = document.createElement("button");
                btn.className = "era-btn";
                btn.innerText = data.eras[eraKey].name;
                btn.id = `era-${eraKey}`;
                btn.onclick = () => startQuiz(key, eraKey);
                eraSelector.appendChild(btn);
            });
            document.getElementById("admin-pin").style.display = "none";
            document.body.removeAttribute("data-era");
            document.body.dataset.region = key;
            if (typeof resetMapView === "function") resetMapView();
        }

        // クイズ開始
        function startQuiz(regionKey, eraKey) {
            currentRegion = regionKey;
            currentEra = eraKey;
            document.body.dataset.era = eraKey;
            const eraData = masterData[regionKey].eras[eraKey];
            const added = JSON.parse(localStorage.getItem(`quiz_added_${regionKey}_${eraKey}`) || "[]");
            questions = [...(eraData.fixed || []), ...added];
            currentIdx = 0;

            document.querySelectorAll('.era-btn').forEach(b => b.classList.toggle('active', b.id === `era-${eraKey}`));
            document.getElementById("era-display").innerText = `${masterData[regionKey].name} / ${eraData.name}`;
            
            showQuestion();
            syncRanking();
        }

        function showQuestion() {
            if (!questions.length) return;
            isAnswered = false;
            const q = questions[currentIdx];
            document.getElementById("q-text").innerText = q.text;
            document.getElementById("result").innerText = "";
            document.getElementById("next-btn").style.display = "none";
            const container = document.getElementById("node-container");
            container.innerHTML = "";
            
            let others = questions.filter(o => o.text !== q.text);
            let choices = [{...q, correct: true}, ...others.sort(() => Math.random() - 0.5).slice(0, 3)].sort(() => Math.random() - 0.5);
            
            choices.forEach(c => {
                const n = document.createElement("div");
                n.className = "target-node";
                n.style.top = c.top; n.style.left = c.left;
                if(c.correct) n.dataset.isCorrect = "true";
                n.onclick = (e) => {
                    e.stopPropagation();
                    if(isAnswered) return;
                    isAnswered = true;
                    if(c.correct) { n.classList.add("correct"); document.getElementById("result").innerText = "⭕ 正解！"; addPoint(); }
                    else { n.classList.add("wrong"); document.getElementById("result").innerText = "❌ 不正解"; highlightCorrect(); }
                    document.getElementById("next-btn").style.display = "block";
                };
                container.appendChild(n);
            });
        }

        function highlightCorrect() {
            document.querySelectorAll(".target-node").forEach(n => {
                if(n.dataset.isCorrect === "true") n.classList.add("highlight");
            });
        }

        function nextQuestion() { currentIdx = (currentIdx + 1) % questions.length; showQuestion(); }

        // --- サーバー通信 (GASタグ対応版) ---
        function syncRanking() {
            if (!GAS_URL.includes("https")) return;
            const oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.remove();
            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = `${GAS_URL}?action=get&callback=receiveRanking&t=${new Date().getTime()}`;
            document.body.appendChild(script);
        }

        async function uploadScore(score) {
            if (!GAS_URL.includes("https")) return;
            const tag = `${currentRegion}_${currentEra}`;
            try {
                await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name: currentUser, score: score, tag: tag }) });
                setTimeout(syncRanking, 2000);
            } catch (e) { console.error("送信失敗"); }
        }

       // --- ユーザー管理 (ここを差し替え！) ---
function loginUser() {
    const name = document.getElementById("user-name-input").value.trim();
    if (!name) return alert("ネームを入力してね！");
    currentUser = name;
    localStorage.setItem("quiz_current_user", name);
    showUserInfo();
    if(currentRegion && currentEra) syncRanking();
}

function logoutUser() {
    if(confirm("ユーザーを変更しますか？")) {
        localStorage.removeItem("quiz_current_user");
        currentUser = null;
        // 入力フォームを復活させて、表示をリセット
        document.getElementById("login-form").style.display = "block";
        document.getElementById("user-info-area").style.display = "none";
        document.getElementById("user-name-input").value = "";
        document.getElementById("ranking-list").innerHTML = "ログインしてね";
        updateScoreUI();
    }
}

function checkLocalLogin() {
    const saved = localStorage.getItem("quiz_current_user");
    if (saved) { currentUser = saved; showUserInfo(); }
}

function showUserInfo() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("user-info-area").style.display = "block";
    document.getElementById("display-name").innerText = currentUser;
    updateScoreUI();
}

function updateScoreUI() {
    // ログインしてない時や時代未選択の時は0を表示
    if(!currentUser || !currentEra) {
        document.getElementById("user-total-score").innerText = "0";
        return;
    }
    const tag = `${currentRegion}_${currentEra}`;
    const score = localStorage.getItem(`score_${currentUser}_${tag}`) || 0;
    document.getElementById("user-total-score").innerText = score;
}

        function addPoint() {
            if (!currentUser || !currentEra) return;
            const tag = `${currentRegion}_${currentEra}`;
            let score = parseInt(localStorage.getItem(`score_${currentUser}_${tag}`) || 0) + 1;
            localStorage.setItem(`score_${currentUser}_${tag}`, score);
            updateScoreUI();
            uploadScore(score);
        }

        // --- 地図ズーム・ドラッグ ---
        function applyMapTransform() {
            const content = document.getElementById("map-content");
            content.style.transform = `translate(${mapTranslateX}px, ${mapTranslateY}px) scale(${mapScale})`;
        }
        function containerToContentPercent(clientX, clientY) {
            const container = document.getElementById("map-container");
            const content = document.getElementById("map-content");
            const rect = container.getBoundingClientRect();
            const cx = clientX - rect.left, cy = clientY - rect.top;
            const cw = content.offsetWidth, ch = content.offsetHeight;
            if (!cw || !ch) return null;
            const contentX = (cx - mapTranslateX) / mapScale;
            const contentY = (cy - mapTranslateY) / mapScale;
            const leftPct = (contentX / cw * 100), topPct = (contentY / ch * 100);
            return { top: topPct.toFixed(1) + "%", left: leftPct.toFixed(1) + "%" };
        }
        function resetMapView() {
            mapScale = 1; mapTranslateX = 0; mapTranslateY = 0;
            applyMapTransform();
        }
        (function setupMapZoomPan() {
            const container = document.getElementById("map-container");
            const content = document.getElementById("map-content");
            const MIN_SCALE = 0.5, MAX_SCALE = 3;
            container.addEventListener("wheel", function(e) {
                e.preventDefault();
                const rect = container.getBoundingClientRect();
                const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, mapScale * factor));
                const contentX = (cx - mapTranslateX) / mapScale, contentY = (cy - mapTranslateY) / mapScale;
                mapTranslateX = cx - contentX * newScale;
                mapTranslateY = cy - contentY * newScale;
                mapScale = newScale;
                applyMapTransform();
            }, { passive: false });
            container.addEventListener("mousedown", function(e) {
                if (e.target.closest(".target-node") || e.target.closest("#map-reset-btn")) return;
                mapDragging = true; mapJustDragged = false;
                mapDragStartX = e.clientX; mapDragStartY = e.clientY;
                mapDragStartTx = mapTranslateX; mapDragStartTy = mapTranslateY;
                container.classList.add("dragging");
            });
            document.addEventListener("mousemove", function(e) {
                if (!mapDragging) return;
                mapTranslateX = mapDragStartTx + (e.clientX - mapDragStartX);
                mapTranslateY = mapDragStartTy + (e.clientY - mapDragStartY);
                mapJustDragged = true;
                applyMapTransform();
            });
            document.addEventListener("mouseup", function() {
                if (mapDragging) container.classList.remove("dragging");
                mapDragging = false;
            });
            container.addEventListener("touchstart", function(e) {
                if (e.target.closest(".target-node") || e.target.closest("#map-reset-btn")) return;
                if (e.touches.length === 1) {
                    mapDragging = true; mapJustDragged = false;
                    mapDragStartX = e.touches[0].clientX; mapDragStartY = e.touches[0].clientY;
                    mapDragStartTx = mapTranslateX; mapDragStartTy = mapTranslateY;
                }
            }, { passive: true });
            container.addEventListener("touchmove", function(e) {
                if (mapDragging && e.touches.length === 1) {
                    e.preventDefault();
                    mapTranslateX = mapDragStartTx + (e.touches[0].clientX - mapDragStartX);
                    mapTranslateY = mapDragStartTy + (e.touches[0].clientY - mapDragStartY);
                    mapJustDragged = true;
                    applyMapTransform();
                }
            }, { passive: false });
            container.addEventListener("touchend", function() { mapDragging = false; });
            document.getElementById("map-reset-btn").addEventListener("click", function(e) { e.stopPropagation(); resetMapView(); });
        })();
        // --- 管理モード（座標はズーム時も正しく地図上の％に変換） ---
        document.getElementById("map-container").addEventListener("click", function(e) {
            if (e.target.closest(".target-node") || e.target.closest("#map-reset-btn")) return;
            if (mapJustDragged) { mapJustDragged = false; return; }
            const p = containerToContentPercent(e.clientX, e.clientY);
            if (!p) return;
            lastClickedPos = { top: p.top, left: p.left };
            document.getElementById("selected-coord").innerText = `T:${p.top} L:${p.left}`;
            const pin = document.getElementById("admin-pin");
            pin.style.display = "block"; pin.style.top = p.top; pin.style.left = p.left;
        });
        function addNewQuestion() {
            const t = document.getElementById("new-q-text").value.trim();
            if(!t || !lastClickedPos || !currentEra) return alert("名前、場所、時代を確定させてね！");
            const key = `quiz_added_${currentRegion}_${currentEra}`;
            const s = JSON.parse(localStorage.getItem(key) || "[]");
            s.push({ text: t, ...lastClickedPos });
            localStorage.setItem(key, JSON.stringify(s));
            document.getElementById("new-q-text").value = "";
            startQuiz(currentRegion, currentEra);
        }
        function exportAllRegions() {
            const fullData = JSON.parse(JSON.stringify(masterData));
            Object.keys(fullData).forEach(reg => {
                Object.keys(fullData[reg].eras).forEach(era => {
                    const added = JSON.parse(localStorage.getItem(`quiz_added_${reg}_${era}`) || "[]");
                    fullData[reg].eras[era].fixed = [...fullData[reg].eras[era].fixed, ...added];
                });
            });
            document.getElementById("export-area").value = JSON.stringify(fullData, null, 2);
        }

        window.onload = fetchQuestions;
    </script>
