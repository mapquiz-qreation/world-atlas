<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1100">
    <title>WorldAtlas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🗺️ WorldAtlas</h1>

    <div id="main-layout">
        <div id="sidebar">
            <!-- ユーザー登録 -->
            <div id="user-panel">
                <div id="login-form">
                    <strong>👤 受験生登録</strong><br>
                    <input type="text" id="user-name-input" placeholder="名前を入力" style="width:140px; margin-top:5px; padding:5px;">
                    <button id="login-btn" class="mode-btn" style="min-width:60px;">参戦</button>
                </div>
                <div id="user-info-area" style="display:none;">
                    ログイン中: <span id="display-name" style="font-weight:bold;"></span><br>
                    正解数: <span class="score-badge" id="user-total-score">0</span>
                    <hr>
                    <div id="ranking-title">🏆 時代別TOP10</div>
                    <div id="ranking-list">時代を選択してね</div>
                    <button id="logout-btn" style="font-size:10px; margin-top:10px; color:#d32f2f; cursor:pointer; background:none; border:1px solid #d32f2f; border-radius:3px; padding:2px 5px;">ログアウト / ユーザー変更</button>
                </div>
            </div>

            <!-- 地域・時代選択 -->
            <div class="section-label">REGION / 地域</div>
            <div id="mode-selector"></div>
            <div class="section-label">ERA / 時代</div>
            <div id="era-selector">地域を先に選んでね</div>

            <!-- クイズ -->
            <div id="question-box">
                <div id="scope-banner"></div>
                <div id="era-display" style="font-size:10px; color:#8d6e63; margin-bottom:5px;">-</div>
                <span id="q-text">Ready?</span>
                <p id="result"></p>
                <button id="next-btn">次の問題へ →</button>
            </div>

            <!-- 管理モード -->
            <div id="admin-panel">
                <details>
                    <summary>🛠️ 座標調整ツール</summary>
                    座標: <strong id="selected-coord" style="color:red;">未選択</strong>
                    <input type="text" id="new-q-text" placeholder="地点名" style="width:90%; margin:5px 0; padding:3px;">
                    <button id="add-question-btn" style="width:100%;">一時保存</button>
                    <button id="export-btn" style="width:100%; margin:5px 0;">JSON抽出</button>
                    <textarea id="export-area" readonly style="width:95%; height:60px; font-size:9px;"></textarea>
                </details>
                <details id="scope-builder">
                    <summary>📋 試験範囲URLジェネレーター</summary>
                    <div style="font-size:10px; color:#888; margin:4px 0;">出題したい時代にチェックを入れてURLを生成・共有してください。</div>
                    <div id="scope-checklist" style="max-height:160px; overflow-y:auto; border:1px solid var(--border); border-radius:4px; padding:4px; margin:4px 0; background:rgba(0,0,0,0.1);"></div>
                    <button id="copy-scope-url-btn" style="width:100%; margin-top:4px;">🔗 試験範囲URLをコピー</button>
                </details>
            </div>
        </div>

        <!-- マップ -->
        <div id="map-container">
            <div id="map-content">
                <img id="map-image" src="map.png" draggable="false">
                <div id="admin-pin"></div>
                <div id="node-container"></div>
            </div>
            <button type="button" id="map-reset-btn" title="全体表示">全体表示</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
