<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>世界史地図クイズ - 完全同期版</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f1ea; color: #3e2723; margin: 0; padding: 10px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        h1 { font-size: 18px; margin: 0 0 5px 0; text-align: center; }
        #main-layout { display: flex; gap: 15px; flex: 1; align-items: flex-start; justify-content: center; }
        #sidebar { width: 280px; display: flex; flex-direction: column; gap: 8px; height: 90vh; overflow-y: auto; }
        #user-panel { background: #efebe9; padding: 12px; border-radius: 8px; border: 2px solid #a1887f; }
        #user-info-area { display: none; margin-top: 8px; font-size: 13px; }
        .score-badge { display: inline-block; background: #5d4037; color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        #ranking-list { font-size: 11px; background: white; padding: 5px; border-radius: 4px; margin-top: 5px; border: 1px solid #ccc; min-height: 50px; }
        #mode-selector { display: flex; gap: 4px; flex-wrap: wrap; }
        .mode-btn { flex: 1; min-width: 60px; padding: 6px; font-size: 12px; cursor: pointer; border-radius: 4px; border: 1px solid #5d4037; background: #d7ccc8; font-weight: bold; }
        .mode-btn.active { background: #5d4037; color: white; }
        #question-box { background: white; padding: 12px; border-radius: 8px; border: 2px solid #5d4037; text-align: center; }
        #q-text { display: block; font-size: 20px; font-weight: bold; color: #d32f2f; margin: 5px 0; }
        #result { font-size: 16px; font-weight: bold; min-height: 20px; margin: 5px 0; }
        #next-btn { width: 100%; padding: 8px; background: #5d4037; color: white; border: none; border-radius: 4px; cursor: pointer; display: none; font-weight: bold; }
        #map-container { position: relative; border: 4px solid #3e2723; border-radius: 4px; background: #e0f2f1; line-height: 0; overflow: hidden; max-height: 85vh; }
        #map-image { height: 75vh; width: auto; display: block; -webkit-user-drag: none; cursor: crosshair; }
        .target-node { position: absolute; width: 18px; height: 18px; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #5d4037; background: white; cursor: pointer; z-index: 5; transition: 0.2s; }
        .target-node.correct { background: #388e3c !important; border-color: #1b5e20 !important; box-shadow: 0 0 8px #388e3c; z-index: 10; }
        .target-node.wrong { background: #d32f2f !important; opacity: 0.6; }
        #admin-panel { font-size: 11px; background: rgba(239, 235, 233, 0.8); padding: 10px; border-radius: 6px; border: 1px solid #a1887f; }
        textarea { width: 95%; height: 60px; font-family: monospace; font-size: 10px; }
    </style>
</head>
<body>

    <h1>🗺️ 世界史 地図クイズ</h1>

    <div id="main-layout">
        <div id="sidebar">
            <div id="user-panel">
                <div id="login-form">
                    <strong>👤 受験生登録</strong><br>
                    <input type="text" id="user-name-input" placeholder="名前を入力" style="width:140px; margin-top:5px;">
                    <button onclick="loginUser()">開始</button>
                </div>
                <div id="user-info-area">
                    ログイン: <span id="display-name" style="font-weight:bold;"></span><br>
                    君の正解数: <span class="score-badge" id="user-total-score">0</span>
                    <hr>
                    <strong>🏆 全国ランキング</strong>
                    <div id="ranking-list">同期中...</div>
                    <button onclick="logoutUser()" style="font-size:9px; margin-top:5px;">ログアウト</button>
                </div>
            </div>
            <div id="mode-selector"></div>
            <div id="question-box">
                <span id="q-text">読み込み中...</span>
                <p id="result"></p>
                <button id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
            </div>
            <div id="admin-panel">
                <details>
                    <summary>🛠️ 管理モード</summary>
                    <input type="text" id="new-q-text" placeholder="地点名">
                    <button onclick="addNewQuestion()">一時保存</button>
                    <button onclick="exportAllRegions()">全JSON出力</button>
                    <textarea id="export-area" readonly></textarea>
                </details>
            </div>
        </div>
        <div id="map-container">
            <img id="map-image" src="map.png" draggable="false">
            <div id="node-container"></div>
        </div>
    </div>

<script>
    // 【1】ここが一番大事！GASのURLを自分の最新のものに貼り直してね！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxNQwAodoz8BF8B0wqQXrNzWZvXImRuIVcVkKi7LCtdSe8ScjIfqbbU1rWKQ9ZxrYKm/exec";

    // 【2】変数の準備（一番上に置くよ）
    let masterData = {}, currentUser = null, currentRegion = '', questions = [], currentIdx = 0, isAnswered = false, lastClickedPos = null;

    // 【3】★ランキングデータを受け取る「窓口」
    // これを一番上に置くことで、GASからのデータを確実にキャッチするよ！
    window.receiveRanking = function(scores) {
        console.log("GASからデータ受信成功:", scores);
        const list = document.getElementById("ranking-list");
        if (!list) return;

        if (!Array.isArray(scores) || scores.length === 0) {
            list.innerHTML = "<div>まだデータがありません</div>";
            return;
        }

        // スコア順に並び替え
        scores.sort((a, b) => b.score - a.score);
        list.innerHTML = scores.slice(0, 10).map((s, i) => 
            `<div>${i+1}位: ${s.name} (${s.score}点)</div>`
        ).join("");

        // 自分の最新スコアを反映
        if (currentUser) {
            const myData = scores.find(s => s.name === currentUser);
            if (myData) {
                localStorage.setItem("quiz_score_" + currentUser, myData.score);
                updateScoreUI();
            }
        }
    };

    // 【4】問題データの読み込み
    async function fetchQuestions() {
        try {
            const res = await fetch('questions.json');
            if (!res.ok) throw new Error("ファイルが見つかりません");
            masterData = await res.json();
            setupButtons();
            checkLocalLogin();
        } catch (e) {
            console.error("JSON読込失敗:", e.message);
            alert("JSON読込失敗: questions.jsonを確認してね");
        }
    }

    // 【5】ランキング同期（JSONP方式）
    function syncRanking() {
        if (!GAS_URL.includes("https")) return;
        const oldScript = document.getElementById('jsonp-script');
        if (oldScript) oldScript.remove();
        
        const script = document.createElement('script');
        script.id = 'jsonp-script';
        // callback=receiveRanking という名前で窓口を指定するよ
        script.src = `${GAS_URL}?action=get&callback=receiveRanking&t=${new Date().getTime()}`;
        document.body.appendChild(script);
    }

    // 【6】スコアをサーバーに飛ばす
    async function uploadScore(score) {
        if (!GAS_URL.includes("https")) return;
        try {
            await fetch(GAS_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify({ name: currentUser, score: score }) 
            });
            setTimeout(syncRanking, 2000); // 2秒待ってからランキングを更新
        } catch (e) { console.error("送信失敗:", e); }
    }

    // --- ユーザー管理 ---
    function loginUser() {
        const name = document.getElementById("user-name-input").value.trim();
        if (!name) return alert("名前を入れてね！");
        currentUser = name;
        localStorage.setItem("quiz_current_user", name);
        showUserInfo();
        syncRanking();
    }
    function logoutUser() { localStorage.removeItem("quiz_current_user"); location.reload(); }
    function checkLocalLogin() {
        const saved = localStorage.getItem("quiz_current_user");
        if (saved) { currentUser = saved; showUserInfo(); syncRanking(); }
    }
    function showUserInfo() {
        document.getElementById("login-form").style.display = "none";
        document.getElementById("user-info-area").style.display = "block";
        document.getElementById("display-name").innerText = currentUser;
        updateScoreUI();
    }
    function updateScoreUI() {
        const score = localStorage.getItem("quiz_score_" + currentUser) || 0;
        document.getElementById("user-total-score").innerText = score;
    }
    function addPoint() {
        if (!currentUser) return;
        let score = parseInt(localStorage.getItem("quiz_score_" + currentUser) || 0) + 1;
        localStorage.setItem("quiz_score_" + currentUser, score);
        updateScoreUI();
        uploadScore(score);
    }

    // --- クイズの動き ---
    function setupButtons() {
        const selector = document.getElementById("mode-selector");
        selector.innerHTML = "";
        const keys = Object.keys(masterData);
        keys.forEach(key => {
            const btn = document.createElement("button");
            btn.className = "mode-btn";
            btn.innerText = masterData[key].name;
            btn.onclick = () => loadRegion(key);
            btn.id = `btn-${key}`;
            selector.appendChild(btn);
        });
        if (keys.length > 0) loadRegion(keys[0]);
    }
    function loadRegion(key) {
        currentRegion = key;
        const data = masterData[key];
        const added = JSON.parse(localStorage.getItem("quiz_added_" + key) || "[]");
        questions = [...(data.fixed || []), ...added];
        currentIdx = 0;
        document.getElementById("map-image").src = data.img;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${key}`));
        showQuestion();
    }
    function showQuestion() {
        if (!questions.length) return;
        isAnswered = false;
        const q = questions[currentIdx];
        document.getElementById("q-text").innerText = q.text;
        document.getElementById("result").innerText = "";
        document.getElementById("next-btn").style.display = "none";
        const container = document.getElementById("node-container");
        container.innerHTML = "";
        let others = questions.filter(o => o.text !== q.text);
        let choices = [{...q, correct: true}, ...others.sort(() => Math.random() - 0.5).slice(0, 3)].sort(() => Math.random() - 0.5);
        choices.forEach(c => {
            const n = document.createElement("div");
            n.className = "target-node";
            n.style.top = c.top; n.style.left = c.left;
            n.onclick = (e) => {
                e.stopPropagation();
                if(isAnswered) return;
                isAnswered = true;
                if(c.correct) { n.classList.add("correct"); document.getElementById("result").innerText = "⭕ 正解！"; addPoint(); }
                else { n.classList.add("wrong"); document.getElementById("result").innerText = "❌ 不正解"; highlightCorrect(q); }
                document.getElementById("next-btn").style.display = "block";
            };
            container.appendChild(n);
        });
    }
    function highlightCorrect(q) {
        document.querySelectorAll(".target-node").forEach(n => {
            if(n.style.top === q.top && n.style.left === q.left) n.classList.add("correct");
        });
    }
    function nextQuestion() { currentIdx = (currentIdx + 1) % questions.length; showQuestion(); }

    // --- 管理モード ---
    document.getElementById("map-container").addEventListener("click", e => {
        const img = document.getElementById("map-image");
        const r = img.getBoundingClientRect();
        const x = ((e.clientX - r.left) / r.width * 100).toFixed(1) + "%";
        const y = ((e.clientY - r.top) / r.height * 100).toFixed(1) + "%";
        lastClickedPos = { top: y, left: x };
    });
    function addNewQuestion() {
        const t = document.getElementById("new-q-text").value;
        if(!t || !lastClickedPos) return alert("名前と場所を選んで！");
        const s = JSON.parse(localStorage.getItem("quiz_added_" + currentRegion) || "[]");
        s.push({ text: t, ...lastClickedPos });
        localStorage.setItem("quiz_added_" + currentRegion, JSON.stringify(s));
        loadRegion(currentRegion);
    }
    function exportAllRegions() {
        const fullData = JSON.parse(JSON.stringify(masterData));
        Object.keys(fullData).forEach(key => {
            const added = JSON.parse(localStorage.getItem("quiz_added_" + key) || "[]");
            fullData[key].fixed = [...fullData[key].fixed, ...added];
        });
        document.getElementById("export-area").value = JSON.stringify(fullData, null, 2);
    }

    // 最初の一歩
    window.onload = fetchQuestions;
</script>
</body>
</html>
