<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WorldAtlas</title>
    <style>
        /* =====================================================
           CSS変数定義（デフォルト値）
           各テーマは変数だけ上書き → コンポーネント側は共通ルールのみ
           ===================================================== */
        :root {
            --bg: #f4f1ea;      --text: #3e2723;
            --panel: #efebe9;   --border: #B0BEC5;
            --lbl-a: #8d6e63;   --lbl-b: #5d4037;  --lbl-text: #fffaf0;
            --q: #d32f2f;
            --btn: #d7ccc8;     --btn-c: #3e2723;  --btn-bd: #B0BEC5;
            --btn-on: #5d4037;  --btn-on-c: #fff;  --btn-on-bd: #B0BEC5;
            --act: #5d4037;     --act-c: white;
            --map: #e0f2f1;
            --rank: white;      --rank-bd: #B0BEC5; --rank-c: inherit;
            --rank-title: #d32f2f;
        }

        /* 古代ヨーロッパ（石板・砂色） */
        body[data-era="ancient"] {
            --bg: #f5ecd8;      --text: #4a3526;
            --panel: #fbf3dd;   --border: #6d4c41;
            --lbl-a: #8d6e63;   --lbl-b: #5d4037;
            --q: #5d4037;
            --btn: #e0c9a6;     --btn-c: #4a3526;  --btn-bd: #6d4c41;
            --btn-on: #6d4c41;  --btn-on-c: #fffaf0; --btn-on-bd: #5d4037;
            --act: #6d4c41;     --act-c: #fffaf0;
            --map: #f2e4c8;
            --rank: #fffaf0;    --rank-bd: #8d6e63; --rank-c: #4a3526;
        }
        /* 中世ヨーロッパ（ロイヤルブルー・クリムゾン） */
        body[data-era="medieval"] {
            --bg: #0a2d5c;      --text: #FFFFFF;
            --panel: #0D47A1;   --border: #B0BEC5;
            --lbl-a: #D32F2F;   --lbl-b: #0D47A1;  --lbl-text: #FFFFFF;
            --q: #FFFFFF;
            --btn: #1565C0;     --btn-c: #FFFFFF;  --btn-bd: #B0BEC5;
            --btn-on: #D32F2F;  --btn-on-c: #FFD700;
            --act: #D32F2F;     --act-c: #FFD700;
            --map: #0a2d5c;
            --rank: #0D47A1;    --rank-bd: #B0BEC5; --rank-c: #FFFFFF;
            --rank-title: #FFFFFF;
        }
        /* 近世・近代ヨーロッパ（グレー＋ネイビー） */
        body[data-era="modern"] {
            --bg: #eceff1;      --text: #263238;
            --panel: #ffffff;   --border: #37474f;
            --lbl-a: #546e7a;   --lbl-b: #37474f;  --lbl-text: #eceff1;
            --q: #1e3a5f;
            --btn: #cfd8dc;     --btn-c: #263238;  --btn-bd: #455a64;
            --btn-on: #263238;  --btn-on-c: #e0f7fa; --btn-on-bd: #37474f;
            --act: #263238;     --act-c: #e0f7fa;
            --map: #eceff1;
            --rank: #fafafa;    --rank-bd: #90a4ae;
        }
        /* イスラーム・トルコモンゴル（ターコイズ＋ゴールド） */
        body[data-era="islamic_expansion"],
        body[data-era="turco_mongol"] {
            --bg: #e0f7fa;      --text: #004d40;
            --panel: #fff8e1;   --border: #c49b47;
            --lbl-a: #00796b;   --lbl-b: #c49b47;  --lbl-text: #fffde7;
            --q: #00695c;
            --btn: #b2ebf2;     --btn-c: #004d40;  --btn-bd: #c49b47;
            --btn-on: #00796b;  --btn-on-c: #ffd54f; --btn-on-bd: #c49b47;
            --act: #c49b47;     --act-c: #fffaf0;
            --map: radial-gradient(circle at 30% 30%, #b2ebf2 0, #e0f7fa 50%, #fff8e1 100%);
            --rank: #fdf4da;    --rank-bd: #c49b47; --rank-c: #4a3420;
        }
        /* インド（サフラン＋マゼンタ） */
        body[data-region="india"] {
            --bg: radial-gradient(circle at top, #ffe082 0, #fff3e0 50%, #ffe0b2 100%);
            --text: #4e342e;
            --panel: #fff8e1;   --border: #ff8f00;
            --lbl-a: #ff8f00;   --lbl-b: #d81b60;  --lbl-text: #fffde7;
            --q: #e65100;
            --btn: linear-gradient(135deg,#ffb74d,#f06292); --btn-c: #fff8e1; --btn-bd: #d81b60;
            --btn-on: linear-gradient(135deg,#e65100,#ad1457); --btn-on-c: #fffde7; --btn-on-bd: #6a1b9a;
            --act: #ff6f00;     --act-c: #fffde7;
            --map: radial-gradient(circle at 20% 20%, #f8bbd0 0, #ffe082 40%, #ffb74d 100%);
            --rank: #fff3e0;    --rank-bd: #d81b60; --rank-c: #4e342e;
        }
        /* 中国（朱＋黄金） */
        body[data-region="china"] {
            --bg: #3e0808;      --text: #ffecb3;
            --panel: #4a0f0f;   --border: #fbc02d;
            --lbl-a: #b71c1c;   --lbl-b: #fbc02d;  --lbl-text: #3e2723;
            --q: #ffeb3b;
            --btn: #b71c1c;     --btn-c: #ffecb3;  --btn-bd: #fbc02d;
            --btn-on: #d32f2f;  --btn-on-c: #fff8e1; --btn-on-bd: #ffd54f;
            --act: #b71c1c;     --act-c: #fff8e1;
            --map: radial-gradient(circle at 15% 20%, #fbc02d 0, #4a0f0f 50%, #2b0505 100%);
            --rank: #2b0505;    --rank-bd: #fbc02d; --rank-c: #ffecb3;
        }
        /* 北アメリカ開拓時代（羊皮紙・セピア） */
        body[data-era="frontier"] {
            --bg: #f5e6c8;      --text: #3d2b1f;
            --panel: #faf0d8;   --border: #8b5e3c;
            --lbl-a: #8b5e3c;   --lbl-b: #5c3317;  --lbl-text: #fdf8ef;
            --q: #5c3317;
            --btn: #e0c99a;     --btn-c: #3d2b1f;  --btn-bd: #8b5e3c;
            --btn-on: #5c3317;  --btn-on-c: #fdf8ef; --btn-on-bd: #8b5e3c;
            --act: #8b5e3c;     --act-c: #fdf8ef;
            --map: #f0dbb5;
            --rank: #faf0d8;    --rank-bd: #8b5e3c; --rank-c: #3d2b1f;
            --rank-title: #5c3317;
        }
        /* アメリカ独立革命（星条旗 赤・白・青） */
        body[data-era="independence"] {
            --bg: #e8eef8;      --text: #1a2744;
            --panel: #ffffff;   --border: #B22234;
            --lbl-a: #3C3B6E;   --lbl-b: #B22234;  --lbl-text: #FFFFFF;
            --q: #B22234;
            --btn: #c8d4ee;     --btn-c: #1a2744;  --btn-bd: #3C3B6E;
            --btn-on: #B22234;  --btn-on-c: #FFFFFF; --btn-on-bd: #3C3B6E;
            --act: #3C3B6E;     --act-c: #FFFFFF;
            --map: #dce4f4;
            --rank: #f5f5ff;    --rank-bd: #B22234; --rank-c: #1a2744;
            --rank-title: #B22234;
        }
        /* 南北戦争（煤・灰・深紅） */
        body[data-era="civil_war"] {
            --bg: #1e1e1e;      --text: #dcdcdc;
            --panel: #2a2a2a;   --border: #757575;
            --lbl-a: #424242;   --lbl-b: #616161;  --lbl-text: #dcdcdc;
            --q: #ef9a9a;
            --btn: #383838;     --btn-c: #dcdcdc;  --btn-bd: #757575;
            --btn-on: #B22234;  --btn-on-c: #FFFFFF; --btn-on-bd: #757575;
            --act: #B22234;     --act-c: #FFFFFF;
            --map: #1e1e1e;
            --rank: #2a2a2a;    --rank-bd: #757575; --rank-c: #dcdcdc;
            --rank-title: #ef9a9a;
        }
        /* ラテンアメリカ 太陽の帝国（テラコッタ・黄金） */
        body[data-era="sun_empire"] {
            --bg: radial-gradient(circle at 20% 10%, #bf360c 0, #6d1f05 50%, #3e1000 100%);
            --text: #ffe082;
            --panel: rgba(62,16,0,0.95); --border: #ffd54f;
            --lbl-a: #bf360c;   --lbl-b: #ffd54f;  --lbl-text: #3e1000;
            --q: #ffca28;
            --btn: #bf360c;     --btn-c: #fff8e1;  --btn-bd: #ffd54f;
            --btn-on: #e64a19;  --btn-on-c: #fff8e1; --btn-on-bd: #ffa000;
            --act: #bf360c;     --act-c: #fff8e1;
            --map: radial-gradient(circle at 20% 20%, #ffd54f 0, #7b2d00 40%, #3e1000 100%);
            --rank: rgba(62,16,0,0.95); --rank-bd: #ffd54f; --rank-c: #ffe082;
            --rank-title: #ffd54f;
        }
        /* ラテンアメリカ 黄金と十字架（深緋・紋章金） */
        body[data-era="colonial_era"] {
            --bg: radial-gradient(circle at 80% 10%, #4a148c 0, #311b92 50%, #1a0050 100%);
            --text: #f5deb3;
            --panel: rgba(26,0,80,0.95); --border: #ffc107;
            --lbl-a: #6a1b9a;   --lbl-b: #ffc107;  --lbl-text: #fff8e1;
            --q: #ffd54f;
            --btn: #6a1b9a;     --btn-c: #fff8e1;  --btn-bd: #ffc107;
            --btn-on: #8e24aa;  --btn-on-c: #fff8e1; --btn-on-bd: #ffd54f;
            --act: #6a1b9a;     --act-c: #fff8e1;
            --map: radial-gradient(circle at 80% 10%, #ffc107 0, #4a148c 45%, #1a0050 100%);
            --rank: rgba(26,0,80,0.95); --rank-bd: #ffc107; --rank-c: #f5deb3;
            --rank-title: #ffc107;
        }
        /* ラテンアメリカ 解放者の嵐（革命的緑・赤・金） */
        body[data-era="liberation_era"] {
            --bg: linear-gradient(160deg, #004d00 0%, #002200 60%, #1a0000 100%);
            --text: #e8f5e9;
            --panel: rgba(0,34,0,0.95); --border: #ffcc02;
            --lbl-a: #1b5e20;   --lbl-b: #c62828;  --lbl-text: #fffde7;
            --q: #ffcc02;
            --btn: #1b5e20;     --btn-c: #fffde7;  --btn-bd: #ffcc02;
            --btn-on: #c62828;  --btn-on-c: #fffde7; --btn-on-bd: #ffcc02;
            --act: #c62828;     --act-c: #fffde7;
            --map: linear-gradient(160deg, #1b5e20 0%, #004d00 60%, #b71c1c 100%);
            --rank: rgba(0,34,0,0.95); --rank-bd: #ffcc02; --rank-c: #e8f5e9;
            --rank-title: #ffcc02;
        }
        /* 東南アジア（深緑＋オレンジ） */
        body[data-region="southeast_asia"] {
            --bg: radial-gradient(circle at top, #2e7d32 0, #1b5e20 60%, #0d3b16 100%);
            --text: #e8f5e9;
            --panel: rgba(13,59,22,0.95); --border: #ffa000;
            --lbl-a: #1b5e20;   --lbl-b: #ffa000;  --lbl-text: #fffde7;
            --q: #ffca28;
            --btn: linear-gradient(135deg,#388e3c,#ffa000); --btn-c: #fffde7; --btn-bd: #ffb300;
            --btn-on: linear-gradient(135deg,#2e7d32,#f57f17); --btn-on-c: #fffde7; --btn-on-bd: #ffb300;
            --act: #ffa000;     --act-c: #fffde7;
            --map: radial-gradient(circle at 25% 25%, #a5d6a7 0, #2e7d32 45%, #0d3b16 100%);
            --rank: rgba(27,94,32,0.95); --rank-bd: #ffa000; --rank-c: #fffde7;
        }

        /* =====================================================
           共通コンポーネントスタイル（変数を参照するだけ）
           ===================================================== */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s, color 0.2s; }
        h1 { font-size: 20px; margin: 0 0 10px 0; text-align: center; letter-spacing: 2px; }
        #main-layout { display: flex; gap: 15px; flex: 1; align-items: flex-start; justify-content: center; }

        #sidebar { width: 300px; display: flex; flex-direction: column; gap: 10px; height: 92vh; overflow-y: auto; padding-right: 5px; border: 4px double var(--border); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

        /* 試験範囲バナー（question-box 内に配置） */
        #scope-banner { display: none; font-size: 10px; line-height: 1.5; padding: 5px 8px; border-radius: 5px; background: linear-gradient(135deg, #1a237e, #283593); color: #e8eaf6; border: 2px solid #5c6bc0; box-shadow: 0 1px 4px rgba(0,0,0,0.3); margin-bottom: 6px; }

        #user-panel, #admin-panel, #question-box { border: 4px double var(--border); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        #user-panel { background: var(--panel); padding: 12px; }
        .score-badge { display: inline-block; background: var(--act); color: var(--act-c); padding: 2px 10px; border-radius: 15px; font-weight: bold; }
        #ranking-title { font-weight: bold; font-size: 12px; margin-top: 10px; color: var(--rank-title); }
        #ranking-list { font-size: 11px; background: var(--rank); color: var(--rank-c); padding: 8px; border-radius: 8px; margin-top: 5px; border: 4px double var(--rank-bd); min-height: 60px; max-height: 160px; overflow-y: auto; line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .rank-row { margin: 2px 0; }
        .rank-title-badge { display: inline-block; margin-left: 4px; padding: 1px 6px; font-size: 10px; font-weight: bold; background: linear-gradient(135deg, #ffd54f, #ff8f00); color: #3e2723; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        /* ボタンエリアを sticky にして、サイドバーをスクロールしても常に見える位置に固定 */
        .section-label {
            font-size: 11px; font-weight: bold; margin-bottom: 2px; padding: 4px 8px; border-radius: 6px;
            background: linear-gradient(to right, var(--lbl-a), var(--lbl-b)); color: var(--lbl-text);
            position: sticky; top: 0; z-index: 10;
        }
        #mode-selector, #era-selector {
            display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; min-height: 32px;
            position: sticky; z-index: 9;
            background: var(--bg); /* 透過防止 */
            padding-bottom: 4px;
        }
        #mode-selector { top: 26px; }
        #era-selector  { top: 70px; }
        .mode-btn, .era-btn { flex: 1; min-width: 70px; padding: 8px 5px; font-size: 11px; cursor: pointer; border-radius: 8px; border: 4px double var(--btn-bd); background: var(--btn); color: var(--btn-c); font-weight: bold; transition: 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .mode-btn.active, .era-btn.active { background: var(--btn-on); color: var(--btn-on-c); border-color: var(--btn-on-bd); transform: translateY(-2px); box-shadow: 0 0 10px rgba(255,215,0,0.35); }

        #question-box { background: var(--panel); padding: 15px; text-align: center; position: relative; }
        #q-text { display: block; font-size: 22px; font-weight: bold; color: var(--q); margin: 10px 0; }
        #result { font-size: 18px; font-weight: bold; min-height: 25px; margin: 5px 0; }
        #next-btn { width: 100%; padding: 10px; background: var(--act); color: var(--act-c); border: none; border-radius: 6px; cursor: pointer; display: none; font-weight: bold; font-size: 14px; }

        #map-container { position: relative; border: 4px double var(--border); border-radius: 8px; background: var(--map); line-height: 0; overflow: hidden; max-height: 80vh; box-shadow: 0 2px 8px rgba(0,0,0,0.12); cursor: grab; touch-action: none; }
        #map-container.dragging { cursor: grabbing; }
        #map-content { position: relative; display: inline-block; transform-origin: 0 0; }
        #map-image { height: 75vh; width: auto; display: block; -webkit-user-drag: none; pointer-events: none; }
        #map-content .target-node { pointer-events: auto; }
        #map-reset-btn { position: absolute; bottom: 10px; right: 10px; z-index: 25; padding: 6px 12px; font-size: 12px; background: rgba(62,39,35,0.9); color: #fff; border: 1px solid #fff; border-radius: 6px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        #map-reset-btn:hover { background: #5d4037; }
        .target-node { position: absolute; width: 20px; height: 20px; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #5d4037; background: white; cursor: pointer; z-index: 5; transition: 0.2s; }
        .target-node.correct { background: #388e3c !important; border-color: #1b5e20 !important; box-shadow: 0 0 10px #388e3c; z-index: 10; }
        .target-node.wrong { background: #d32f2f !important; opacity: 0.6; }
        .target-node.highlight { background: #388e3c !important; border-color: #1b5e20 !important; z-index: 15; animation: pulse-ring 1s infinite; }

        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(56,142,60,.7); transform: translate(-50%,-50%) scale(1); }
            70%  { box-shadow: 0 0 0 15px rgba(56,142,60,0); transform: translate(-50%,-50%) scale(1.3); }
            100% { box-shadow: 0 0 0 0 rgba(56,142,60,0); transform: translate(-50%,-50%) scale(1); }
        }

        #admin-panel { font-size: 11px; background: rgba(239,235,233,0.9); padding: 10px; }
        #admin-pin { position: absolute; width: 14px; height: 14px; background: #d32f2f; border: 2px solid white; border-radius: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 20; display: none; }
    </style>
</head>
<body>

    <h1>🗺️ WorldAtlas</h1>

    <div id="main-layout">
        <div id="sidebar">
            <!-- ユーザー登録 -->
           <!-- サイドバーの中の user-panel をこれに差し替えて！ -->
<div id="user-panel">
    <!-- ログイン前：ここが表示されるはず！ -->
    <div id="login-form">
        <strong>👤 受験生登録</strong><br>
        <input type="text" id="user-name-input" placeholder="名前を入力" style="width:140px; margin-top:5px; padding:5px;">
        <button onclick="loginUser()" class="mode-btn" style="min-width:60px;">参戦</button>
    </div>

    <!-- ログイン後：最初は隠しておくよ -->
    <div id="user-info-area" style="display:none;">
        ログイン中: <span id="display-name" style="font-weight:bold;"></span><br>
        正解数: <span class="score-badge" id="user-total-score">0</span>
        <hr>
        <div id="ranking-title">🏆 時代別TOP10</div>
        <div id="ranking-list">時代を選択してね</div>
        <button onclick="logoutUser()" style="font-size:10px; margin-top:10px; color:#d32f2f; cursor:pointer; background:none; border:1px solid #d32f2f; border-radius:3px; padding:2px 5px;">ログアウト / ユーザー変更</button>
    </div>
</div>

            <!-- 地域・時代選択（ここに地域ボタン・時代ボタンがJSで入ります） -->
            <div class="section-label">REGION / 地域</div>
            <div id="mode-selector"></div>
            <div class="section-label">ERA / 時代</div>
            <div id="era-selector">地域を先に選んでね</div>

            <!-- クイズ箱 -->
            <div id="question-box">
                <!-- 試験範囲モード時バナー（通常時は非表示） -->
                <div id="scope-banner"></div>
                <div id="era-display" style="font-size:10px; color:#8d6e63; margin-bottom:5px;">-</div>
                <span id="q-text">Ready?</span>
                <p id="result"></p>
                <button id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
            </div>

            <!-- 管理モード -->
            <div id="admin-panel">
                <details>
                    <summary>🛠️ 座標調整ツール</summary>
                    座標: <strong id="selected-coord" style="color:red;">未選択</strong>
                    <input type="text" id="new-q-text" placeholder="地点名" style="width:90%; margin:5px 0; padding:3px;">
                    <button onclick="addNewQuestion()" style="width:100%;">一時保存</button>
                    <button onclick="exportAllRegions()" style="width:100%; margin:5px 0;">JSON抽出</button>
                    <textarea id="export-area" readonly style="width:95%; height:60px; font-size:9px;"></textarea>
                </details>
                <details id="scope-builder">
                    <summary>📋 試験範囲URLジェネレーター</summary>
                    <div style="font-size:10px; color:#888; margin:4px 0;">出題したい時代にチェックを入れてURLを生成・共有してください。</div>
                    <div id="scope-checklist" style="max-height:160px; overflow-y:auto; border:1px solid var(--border); border-radius:4px; padding:4px; margin:4px 0; background:rgba(0,0,0,0.1);"></div>
                    <button onclick="copyScopeUrl()" style="width:100%; margin-top:4px;">🔗 試験範囲URLをコピー</button>
                </details>
            </div>
        </div>

        <!-- マップ -->
        <div id="map-container">
            <div id="map-content">
                <img id="map-image" src="map.png" draggable="false">
                <div id="admin-pin"></div>
                <div id="node-container"></div>
            </div>
            <button type="button" id="map-reset-btn" title="全体表示">全体表示</button>
        </div>
    </div>

    <script>
        // ★君のGASのURLを貼り付けてね！
        const GAS_URL = "https://script.google.com/macros/s/AKfycby59Krxk8EB8kGPO9Z3oIxQK9j7PbN7ZaOFHuQJ16IF1DIU6f5FuzS3xbRIfE4TcEjN/exec";

        // 地域・時代タグごとの第1位称号
        const TAG_TITLES = {
            "china_ancient_china": "👑 始皇帝",
            "china_medieval_china": "👑 天可汗 (てんかがん)",
            "china_early_modern_china": "👑 総督 (そうとく)",
            "mideast_islamic_expansion": "☪️ 正統カリフ",
            "mideast_turco_mongol": "☪️ スルタン・ハン",
            "europe_ancient": "🏛️ インペラトル",
            "europe_medieval": "🏛️ 教皇 (パパ)",
            "europe_modern": "🏛️ 啓蒙専制君主",
            "india_ancient_medieval_india": "🕉️ 転輪聖王 (てんりんじょうおう)",
            "india_mughal_colonial": "🕉️ パードシャー",
            "southeast_asia_ancient": "🌴 諸王の王",
            "southeast_asia_colonial": "🌴 海域の覇者",
            "north_america_frontier": "🤠 開拓王 (フロンティア・キング)",
            "north_america_independence": "🦅 建国の父 (ファウンディング・ファーザー)",
            "north_america_civil_war": "⚔️ 将軍 (ジェネラル)",
            "latin_america_sun_empire": "☀️ 太陽の皇帝 (サパ・インカ)",
            "latin_america_colonial_era": "⚜️ 総督閣下 (ビセロイ)",
            "latin_america_liberation_era": "🦅 リベルタドール (解放者)"
        };

        let masterData = {}, currentUser = null, currentRegion = '', currentEra = '', questions = [], currentIdx = 0, isAnswered = false, lastClickedPos = null;
        // 地図ズーム・ドラッグ用
        let mapScale = 1, mapTranslateX = 0, mapTranslateY = 0;
        let mapDragging = false, mapDragStartX = 0, mapDragStartY = 0, mapDragStartTx = 0, mapDragStartTy = 0, mapJustDragged = false;

        // ランキング受信 (時代別タグ対応)
        window.receiveRanking = function(scores) {
            const list = document.getElementById("ranking-list");
            if (!Array.isArray(scores) || scores.length === 0) {
                list.innerHTML = "この時代のデータはまだないよ！";
                return;
            }
            // 時代タグ(例: europe_ancient)でフィルタリング
            const tag = `${currentRegion}_${currentEra}`;
            const filtered = scores.filter(s => s.tag === tag).sort((a, b) => b.score - a.score);

            if(filtered.length === 0) {
                list.innerHTML = "この時代の挑戦者は君が初めてかも！";
            } else {
                const titleForTag = TAG_TITLES[tag] || "";
                list.innerHTML = filtered.slice(0, 10).map((s, i) => {
                    const isFirst = i === 0;
                    const badge = isFirst && titleForTag ? ` <span class="rank-title-badge">${titleForTag}</span>` : "";
                    return `<div class="rank-row">${i+1}位: ${s.name}${badge} (${s.score}点)</div>`;
                }).join("");
            }

            // 自分のスコア更新
            if (currentUser) {
                const myData = scores.find(s => s.name === currentUser && s.tag === tag);
                if (myData) {
                    localStorage.setItem(`score_${currentUser}_${tag}`, myData.score);
                    updateScoreUI();
                }
            }
        };

        // ─── 試験範囲モード ───────────────────────────────────────────────────
        // scopeStr 例: "europe_ancient,china_ancient_china,mideast_islamic_expansion"
        function startScopeQuiz(scopeStr) {
            const pairs = scopeStr.split(',').map(s => {
                // region キーに "_" が含まれる (north_america 等) ケースを正確に分割
                const region = Object.keys(masterData).find(r => s.startsWith(r + '_'));
                if (!region) return null;
                const era = s.slice(region.length + 1);
                return masterData[region]?.eras[era] ? { region, era } : null;
            }).filter(Boolean);

            if (!pairs.length) {
                console.warn('有効な試験範囲が見つかりませんでした:', scopeStr);
                return;
            }

            // 問題を結合してシャッフル
            const allQ = pairs.flatMap(p => masterData[p.region].eras[p.era].fixed || []);
            questions = allQ.sort(() => Math.random() - 0.5);
            currentIdx = 0;

            // 地図は先頭の地域で表示
            const first = pairs[0];
            currentRegion = first.region;
            currentEra    = first.era;
            document.getElementById('map-image').src = masterData[first.region].img;
            document.body.dataset.region = first.region;
            document.body.dataset.era    = first.era;

            // バナー表示
            const banner = document.getElementById('scope-banner');
            banner.style.display = 'block';
            banner.innerHTML = '<strong>📋 試験範囲モード</strong><br>' +
                pairs.map(p =>
                    `${masterData[p.region].name}／${masterData[p.region].eras[p.era].name}`
                ).join('、');

            document.getElementById('era-display').innerText =
                `📋 試験範囲モード（${pairs.length}時代 / 全${questions.length}問）`;

            showQuestion();
        }

        // チェックボックス一覧を管理パネルに動的生成
        function buildScopeChecklist() {
            const div = document.getElementById('scope-checklist');
            if (!div) return;
            div.innerHTML = '';
            Object.keys(masterData).forEach(region => {
                const regionName = masterData[region].name;
                const grp = document.createElement('div');
                grp.style.cssText = 'margin:4px 0 2px; font-weight:bold; font-size:10px;';
                grp.innerText = regionName;
                div.appendChild(grp);
                Object.keys(masterData[region].eras).forEach(era => {
                    const eraName = masterData[region].eras[era].name;
                    const label = document.createElement('label');
                    label.style.cssText = 'display:block; font-size:10px; padding-left:8px; cursor:pointer;';
                    label.innerHTML =
                        `<input type="checkbox" value="${region}_${era}" style="margin-right:4px;">${eraName}`;
                    div.appendChild(label);
                });
            });
        }

        // チェックした時代からURLを生成してクリップボードにコピー
        function copyScopeUrl() {
            const checked = [...document.querySelectorAll('#scope-checklist input:checked')]
                .map(i => i.value).join(',');
            if (!checked) { alert('時代を1つ以上チェックしてください'); return; }
            const url = location.origin + location.pathname + '?scope=' + checked;
            navigator.clipboard.writeText(url).then(() => {
                alert('URLをコピーしました！\n生徒にこのURLを共有してください。\n\n' + url);
            }).catch(() => {
                // クリップボードAPIが使えない環境向けフォールバック
                prompt('以下のURLをコピーしてください:', url);
            });
        }
        // ─────────────────────────────────────────────────────────────────────

        // 地域別JSONを並列ロード（data/*.json → フォールバックで questions.json）
        async function fetchQuestions() {
            const regions = ['europe', 'mideast', 'india', 'china', 'southeast_asia', 'north_america', 'latin_america'];
            try {
                const results = await Promise.all(
                    regions.map(r => fetch(`data/${r}.json`).then(res => {
                        if (!res.ok) throw new Error(r);
                        return res.json();
                    }))
                );
                regions.forEach((r, i) => { masterData[r] = results[i]; });
            } catch (e) {
                // フォールバック: 従来の questions.json
                console.warn("data/*.json 読込失敗、questions.json にフォールバック:", e.message);
                try {
                    const res = await fetch('questions.json');
                    masterData = await res.json();
                } catch (e2) { console.error("JSON読込失敗"); return; }
            }
            setupRegionButtons();
            buildScopeChecklist();
            checkLocalLogin();
            // 試験範囲モード: ?scope=europe_ancient,china_ancient_china,...
            const scopeParam = new URLSearchParams(window.location.search).get('scope');
            if (scopeParam) startScopeQuiz(scopeParam);
        }

        // 地域ボタン生成
        function setupRegionButtons() {
            const selector = document.getElementById("mode-selector");
            selector.innerHTML = "";
            Object.keys(masterData).forEach(key => {
                const btn = document.createElement("button");
                btn.className = "mode-btn";
                btn.innerText = masterData[key].name;
                btn.id = `btn-${key}`;
                btn.onclick = () => selectRegion(key);
                selector.appendChild(btn);
            });
        }

        // 地域を選択 ➔ 時代ボタンを表示
        function selectRegion(key) {
            currentRegion = key;
            const data = masterData[key];
            document.getElementById("map-image").src = data.img;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${key}`));
            
            const eraSelector = document.getElementById("era-selector");
            eraSelector.innerHTML = "";
            
            Object.keys(data.eras).forEach(eraKey => {
                const btn = document.createElement("button");
                btn.className = "era-btn";
                btn.innerText = data.eras[eraKey].name;
                btn.id = `era-${eraKey}`;
                btn.onclick = () => startQuiz(key, eraKey);
                eraSelector.appendChild(btn);
            });
            document.getElementById("admin-pin").style.display = "none";
            document.body.removeAttribute("data-era");
            document.body.dataset.region = key;
            if (typeof resetMapView === "function") resetMapView();
        }

        // クイズ開始
        function startQuiz(regionKey, eraKey) {
            currentRegion = regionKey;
            currentEra = eraKey;
            document.body.dataset.era = eraKey;
            const eraData = masterData[regionKey].eras[eraKey];
            const added = JSON.parse(localStorage.getItem(`quiz_added_${regionKey}_${eraKey}`) || "[]");
            questions = [...(eraData.fixed || []), ...added];
            currentIdx = 0;

            document.querySelectorAll('.era-btn').forEach(b => b.classList.toggle('active', b.id === `era-${eraKey}`));
            document.getElementById("era-display").innerText = `${masterData[regionKey].name} / ${eraData.name}`;
            
            showQuestion();
            syncRanking();
        }

        function showQuestion() {
            if (!questions.length) return;
            isAnswered = false;
            const q = questions[currentIdx];
            document.getElementById("q-text").innerText = q.text;
            document.getElementById("result").innerText = "";
            document.getElementById("next-btn").style.display = "none";
            const container = document.getElementById("node-container");
            container.innerHTML = "";
            
            let others = questions.filter(o => o.text !== q.text);
            let choices = [{...q, correct: true}, ...others.sort(() => Math.random() - 0.5).slice(0, 3)].sort(() => Math.random() - 0.5);
            
            choices.forEach(c => {
                const n = document.createElement("div");
                n.className = "target-node";
                n.style.top = c.top; n.style.left = c.left;
                if(c.correct) n.dataset.isCorrect = "true";
                n.onclick = (e) => {
                    e.stopPropagation();
                    if(isAnswered) return;
                    isAnswered = true;
                    if(c.correct) { n.classList.add("correct"); document.getElementById("result").innerText = "⭕ 正解！"; addPoint(); }
                    else { n.classList.add("wrong"); document.getElementById("result").innerText = "❌ 不正解"; highlightCorrect(); }
                    document.getElementById("next-btn").style.display = "block";
                };
                container.appendChild(n);
            });
        }

        function highlightCorrect() {
            document.querySelectorAll(".target-node").forEach(n => {
                if(n.dataset.isCorrect === "true") n.classList.add("highlight");
            });
        }

        function nextQuestion() { currentIdx = (currentIdx + 1) % questions.length; showQuestion(); }

        // --- サーバー通信 (GASタグ対応版) ---
        function syncRanking() {
            if (!GAS_URL.includes("https")) return;
            const oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.remove();
            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = `${GAS_URL}?action=get&callback=receiveRanking&t=${new Date().getTime()}`;
            document.body.appendChild(script);
        }

        async function uploadScore(score) {
            if (!GAS_URL.includes("https")) return;
            const tag = `${currentRegion}_${currentEra}`;
            try {
                await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name: currentUser, score, tag }) });
            } catch (e) { console.error("送信失敗"); }
            // GASの処理待ちを考慮して2秒・6秒の2段階でランキング再取得
            setTimeout(syncRanking, 2000);
            setTimeout(syncRanking, 6000);
        }

       // --- ユーザー管理 (ここを差し替え！) ---
function loginUser() {
    const name = document.getElementById("user-name-input").value.trim();
    if (!name) return alert("ネームを入力してね！");
    currentUser = name;
    localStorage.setItem("quiz_current_user", name);
    showUserInfo();
    if(currentRegion && currentEra) syncRanking();
}

function logoutUser() {
    if(confirm("ユーザーを変更しますか？")) {
        localStorage.removeItem("quiz_current_user");
        currentUser = null;
        // 入力フォームを復活させて、表示をリセット
        document.getElementById("login-form").style.display = "block";
        document.getElementById("user-info-area").style.display = "none";
        document.getElementById("user-name-input").value = "";
        document.getElementById("ranking-list").innerHTML = "ログインしてね";
        updateScoreUI();
    }
}

function checkLocalLogin() {
    const saved = localStorage.getItem("quiz_current_user");
    if (saved) { currentUser = saved; showUserInfo(); }
}

function showUserInfo() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("user-info-area").style.display = "block";
    document.getElementById("display-name").innerText = currentUser;
    updateScoreUI();
}

function updateScoreUI() {
    // ログインしてない時や時代未選択の時は0を表示
    if(!currentUser || !currentEra) {
        document.getElementById("user-total-score").innerText = "0";
        return;
    }
    const tag = `${currentRegion}_${currentEra}`;
    const score = localStorage.getItem(`score_${currentUser}_${tag}`) || 0;
    document.getElementById("user-total-score").innerText = score;
}

        function addPoint() {
            if (!currentUser || !currentEra) return;
            const tag = `${currentRegion}_${currentEra}`;
            let score = parseInt(localStorage.getItem(`score_${currentUser}_${tag}`) || 0) + 1;
            localStorage.setItem(`score_${currentUser}_${tag}`, score);
            updateScoreUI();
            uploadScore(score);
        }

        // --- 地図ズーム・ドラッグ ---
        function applyMapTransform() {
            const content = document.getElementById("map-content");
            content.style.transform = `translate(${mapTranslateX}px, ${mapTranslateY}px) scale(${mapScale})`;
        }
        function containerToContentPercent(clientX, clientY) {
            const container = document.getElementById("map-container");
            const content = document.getElementById("map-content");
            const rect = container.getBoundingClientRect();
            const cx = clientX - rect.left, cy = clientY - rect.top;
            const cw = content.offsetWidth, ch = content.offsetHeight;
            if (!cw || !ch) return null;
            const contentX = (cx - mapTranslateX) / mapScale;
            const contentY = (cy - mapTranslateY) / mapScale;
            const leftPct = (contentX / cw * 100), topPct = (contentY / ch * 100);
            return { top: topPct.toFixed(1) + "%", left: leftPct.toFixed(1) + "%" };
        }
        function resetMapView() {
            mapScale = 1; mapTranslateX = 0; mapTranslateY = 0;
            applyMapTransform();
        }
        (function setupMapZoomPan() {
            const container = document.getElementById("map-container");
            const content = document.getElementById("map-content");
            const MIN_SCALE = 0.5, MAX_SCALE = 3;
            container.addEventListener("wheel", function(e) {
                e.preventDefault();
                const rect = container.getBoundingClientRect();
                const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, mapScale * factor));
                const contentX = (cx - mapTranslateX) / mapScale, contentY = (cy - mapTranslateY) / mapScale;
                mapTranslateX = cx - contentX * newScale;
                mapTranslateY = cy - contentY * newScale;
                mapScale = newScale;
                applyMapTransform();
            }, { passive: false });
            container.addEventListener("mousedown", function(e) {
                if (e.target.closest(".target-node") || e.target.closest("#map-reset-btn")) return;
                mapDragging = true; mapJustDragged = false;
                mapDragStartX = e.clientX; mapDragStartY = e.clientY;
                mapDragStartTx = mapTranslateX; mapDragStartTy = mapTranslateY;
                container.classList.add("dragging");
            });
            document.addEventListener("mousemove", function(e) {
                if (!mapDragging) return;
                mapTranslateX = mapDragStartTx + (e.clientX - mapDragStartX);
                mapTranslateY = mapDragStartTy + (e.clientY - mapDragStartY);
                mapJustDragged = true;
                applyMapTransform();
            });
            document.addEventListener("mouseup", function() {
                if (mapDragging) container.classList.remove("dragging");
                mapDragging = false;
            });
            container.addEventListener("touchstart", function(e) {
                if (e.target.closest(".target-node") || e.target.closest("#map-reset-btn")) return;
                if (e.touches.length === 1) {
                    mapDragging = true; mapJustDragged = false;
                    mapDragStartX = e.touches[0].clientX; mapDragStartY = e.touches[0].clientY;
                    mapDragStartTx = mapTranslateX; mapDragStartTy = mapTranslateY;
                }
            }, { passive: true });
            container.addEventListener("touchmove", function(e) {
                if (mapDragging && e.touches.length === 1) {
                    e.preventDefault();
                    mapTranslateX = mapDragStartTx + (e.touches[0].clientX - mapDragStartX);
                    mapTranslateY = mapDragStartTy + (e.touches[0].clientY - mapDragStartY);
                    mapJustDragged = true;
                    applyMapTransform();
                }
            }, { passive: false });
            container.addEventListener("touchend", function() { mapDragging = false; });
            document.getElementById("map-reset-btn").addEventListener("click", function(e) { e.stopPropagation(); resetMapView(); });
        })();
        // --- 管理モード（座標はズーム時も正しく地図上の％に変換） ---
        document.getElementById("map-container").addEventListener("click", function(e) {
            if (e.target.closest(".target-node") || e.target.closest("#map-reset-btn")) return;
            if (mapJustDragged) { mapJustDragged = false; return; }
            const p = containerToContentPercent(e.clientX, e.clientY);
            if (!p) return;
            lastClickedPos = { top: p.top, left: p.left };
            document.getElementById("selected-coord").innerText = `T:${p.top} L:${p.left}`;
            const pin = document.getElementById("admin-pin");
            pin.style.display = "block"; pin.style.top = p.top; pin.style.left = p.left;
        });
        function addNewQuestion() {
            const t = document.getElementById("new-q-text").value.trim();
            if(!t || !lastClickedPos || !currentEra) return alert("名前、場所、時代を確定させてね！");
            const key = `quiz_added_${currentRegion}_${currentEra}`;
            const s = JSON.parse(localStorage.getItem(key) || "[]");
            s.push({ text: t, ...lastClickedPos });
            localStorage.setItem(key, JSON.stringify(s));
            document.getElementById("new-q-text").value = "";
            startQuiz(currentRegion, currentEra);
        }
        function exportAllRegions() {
            const fullData = JSON.parse(JSON.stringify(masterData));
            Object.keys(fullData).forEach(reg => {
                Object.keys(fullData[reg].eras).forEach(era => {
                    const added = JSON.parse(localStorage.getItem(`quiz_added_${reg}_${era}`) || "[]");
                    fullData[reg].eras[era].fixed = [...fullData[reg].eras[era].fixed, ...added];
                });
            });
            document.getElementById("export-area").value = JSON.stringify(fullData, null, 2);
        }

        window.onload = fetchQuestions;
    </script>
