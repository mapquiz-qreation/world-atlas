<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Atlas of Syncro Eras — WorldAtlas</title>
    <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png" sizes="192x192">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: hidden; }

        /* ─── 工事中バナー ─────────────────────────────── */
        #wip-banner {
            flex-shrink: 0;
            background: linear-gradient(90deg, #f57f17, #ff8f00);
            color: #fff;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 12px;
            letter-spacing: 0.5px;
        }

        /* ─── Syncro サブタブ ──────────────────────────── */
        #syncro-sub-tabs {
            flex-shrink: 0;
            display: flex;
            background: var(--panel);
            border-bottom: 2px solid var(--border);
        }
        .syncro-sub-tab {
            flex: 1;
            padding: 9px 4px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            opacity: 0.45;
            transition: opacity 0.2s, color 0.2s;
            letter-spacing: 0.4px;
        }
        .syncro-sub-tab.active {
            opacity: 1;
            color: var(--act);
            border-bottom: 3px solid var(--act);
            margin-bottom: -2px;
        }

        /* ─── 探求モード専用エリア ─────────────────────── */
        #explore-controls { display: contents; }
        #explore-controls.hidden > * { display: none !important; }

        /* ── エポックナビゲーター ── */
        #epoch-nav {
            flex-shrink: 0;
            background: var(--panel);
            border-bottom: 2px solid var(--border);
        }
        #epoch-nav-top {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px 4px;
        }
        .epoch-arrow {
            flex-shrink: 0;
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
            line-height: 1;
        }
        .epoch-arrow:hover { background: rgba(255,255,255,0.14); }
        .epoch-arrow:disabled { opacity: 0.25; cursor: default; }
        #epoch-center {
            flex: 1;
            text-align: center;
        }
        #year-label {
            font-size: 17px;
            font-weight: bold;
            color: var(--text);
            letter-spacing: 1px;
            line-height: 1.2;
        }
        #theme-label {
            font-size: 10px;
            color: var(--act);
            font-weight: bold;
            min-height: 14px;
            margin-top: 2px;
        }
        #epoch-chips {
            display: flex;
            overflow-x: auto;
            gap: 5px;
            padding: 5px 10px 7px;
            scrollbar-width: none;
        }
        #epoch-chips::-webkit-scrollbar { display: none; }
        .epoch-chip {
            flex-shrink: 0;
            padding: 3px 10px;
            border-radius: 14px;
            border: 1.5px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.65);
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .epoch-chip:hover {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.9);
        }
        .epoch-chip.active {
            background: var(--act);
            border-color: var(--act);
            color: #fff;
            box-shadow: 0 0 8px rgba(74,144,217,0.5);
        }
        #pattern-filter {
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 6px 12px;
            background: var(--panel);
            border-bottom: 2px solid var(--border);
            align-items: center;
        }
        #pattern-filter-label {
            font-size: 10px;
            color: var(--text);
            opacity: 0.6;
            font-weight: bold;
            white-space: nowrap;
        }
        .pattern-btn {
            font-size: 11px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .pattern-btn:hover { opacity: 0.8; }
        .pattern-btn.active {
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px currentColor;
        }
        #pattern-desc {
            flex-shrink: 0;
            display: none;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            border-left: 4px solid var(--act);
            background: rgba(0,0,0,0.15);
            color: var(--text);
            line-height: 1.5;
        }
        #pattern-desc.visible { display: block; }

        /* ─── 共有マップ ───────────────────────────────── */
        #tl-map { flex: 1; min-height: 0; position: relative; }

        /* ─── 探求モード・情報パネル ───────────────────── */
        #info-panel {
            flex-shrink: 0;
            height: 26vh;
            overflow-y: auto;
            background: var(--panel);
            border-top: 4px double var(--border);
            padding: 10px 14px 14px;
        }
        #info-panel.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            opacity: 0.5;
            font-size: 13px;
        }
        #info-region-label { font-size: 10px; font-weight: bold; margin-bottom: 3px; }
        #info-title        { font-size: 15px; font-weight: bold; color: var(--q); margin-bottom: 4px; }
        #info-detail       { font-size: 12px; line-height: 1.7; color: var(--text); margin-bottom: 8px; }
        #info-terms        { font-size: 11px; margin-bottom: 8px; }
        #info-terms span {
            display: inline-block;
            background: var(--lbl-a);
            color: var(--lbl-text);
            border-radius: 4px;
            padding: 2px 7px;
            margin: 2px 3px 2px 0;
        }
        #info-patterns { display: flex; flex-wrap: wrap; gap: 4px; }
        .info-pattern-badge {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            border: 2px solid transparent;
        }

        /* ─── 同時代クイズパネル ───────────────────────── */
        #quiz-panel {
            display: none;
            flex-shrink: 0;
            background: var(--panel);
            border-top: 4px double var(--border);
            padding: 10px 14px 14px;
            overflow-y: auto;
            max-height: 48vh;
        }
        #quiz-panel.active { display: block; }

        #quiz-counter {
            font-size: 10px;
            color: rgba(255,255,255,0.65);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #quiz-streak {
            font-size: 10px;
            font-weight: bold;
            color: #ffd54f;
        }

        #quiz-question-text {
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.7;
        }
        #quiz-question-text .hint {
            font-size: 10px;
            font-weight: normal;
            color: #7ecfff;
            display: block;
            margin-bottom: 4px;
        }

        #quiz-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }
        .quiz-choice-btn {
            padding: 10px 8px;
            font-size: 12px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            text-align: left;
            line-height: 1.45;
            transition: border-color 0.15s, background 0.15s;
            font-weight: 500;
        }
        .quiz-choice-btn:hover:not(:disabled) {
            border-color: var(--act);
            background: rgba(255,255,255,0.16);
        }
        .quiz-choice-btn.correct {
            border-color: #66bb6a !important;
            background: rgba(102,187,106,0.28);
            color: #c8f0cb;
            font-weight: bold;
        }
        .quiz-choice-btn.wrong {
            border-color: #ef5350 !important;
            background: rgba(239,83,80,0.22);
            color: #ffb3b0;
            opacity: 0.85;
        }
        .quiz-choice-btn:disabled { cursor: default; }

        #quiz-result {
            font-size: 13px;
            text-align: center;
            padding: 6px 4px;
            font-weight: bold;
            min-height: 22px;
            color: rgba(255,255,255,0.9);
        }
        #quiz-result.ok { color: #a5d6a7; }
        #quiz-result.ng { color: #ffb3b0; }

        #quiz-actions {
            display: none;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }
        #quiz-actions.visible { display: flex; }

        .quiz-action-btn {
            width: 100%;
            padding: 9px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: 0.4px;
        }
        .quiz-action-btn:hover { opacity: 0.8; }
        #quiz-next-btn {
            background: var(--act);
            color: var(--act-c);
            border-color: var(--act);
        }
        #quiz-explore-btn {
            background: transparent;
            color: var(--act);
            border-color: var(--act);
        }

        /* ─── パルスアニメ ─────────────────────────────── */
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.6); }
            70%  { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        /* ─── 年号並べ替えパネル ───────────────────────── */
        #chrono-panel {
            display: none;
            flex-shrink: 0;
            background: var(--panel);
            border-top: 4px double var(--border);
            padding: 10px 14px 14px;
            overflow-y: auto;
            max-height: 55vh;
        }
        #chrono-panel.active { display: block; }

        #chrono-region-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .chrono-region-btn {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            transition: all 0.15s;
        }
        .chrono-region-btn.active {
            border-color: var(--act);
            color: var(--act);
            background: rgba(255,255,255,0.12);
            font-weight: bold;
        }

        #chrono-cards {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 10px;
        }
        .chrono-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
        }
        .chrono-card:hover {
            border-color: var(--act);
            background: rgba(255,255,255,0.16);
        }
        .chrono-card:active { transform: scale(0.98); }
        .chrono-card.selected {
            border-color: var(--act);
            background: rgba(74,144,217,0.2);
        }
        .chrono-card.result-correct {
            border-color: #66bb6a;
            background: rgba(102,187,106,0.25);
            cursor: default;
        }
        .chrono-card.result-wrong {
            border-color: #ef5350;
            background: rgba(239,83,80,0.2);
            cursor: default;
        }

        .chrono-badge {
            flex-shrink: 0;
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold;
            border: 2px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            transition: all 0.15s;
        }
        .chrono-badge.filled   { background: var(--act); border-color: var(--act); color: #fff; }
        .chrono-badge.badge-ok { background: #66bb6a;    border-color: #66bb6a;    color: #fff; }
        .chrono-badge.badge-ng { background: #ef5350;    border-color: #ef5350;    color: #fff; }

        .chrono-card-text  { font-size: 12px; line-height: 1.45; color: #fff; font-weight: 500; flex: 1; }
        .chrono-year-badge { font-size: 10px; color: #7ecfff; font-weight: bold; margin-top: 3px; }
        .chrono-user-pos   { font-size: 10px; color: #ffb3b0; white-space: nowrap; font-weight: bold; }

        #chrono-hint {
            font-size: 11px; text-align: center;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.6);
        }

        /* ── 版図トグルボタン（パターンフィルター内に inline 配置） ── */
        #territory-toggle-btn {
            padding: 2px 9px;
            border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        #territory-toggle-btn:hover {
            background: rgba(255,255,255,0.18);
        }

        /* ── 版図凡例（マップ上の絶対位置オーバーレイ） ── */
        #territory-legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            z-index: 500;
            padding: 7px 10px;
            background: rgba(10,20,35,0.82);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.88);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .tl-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 11px;
        }
        .tl-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 2px 0;
        }
        .tl-color {
            display: inline-block;
            width: 13px; height: 13px;
            border-radius: 3px;
            flex-shrink: 0;
            opacity: 0.85;
        }

        /* ── 版図の常時表示ラベル ── */
        .leaflet-tooltip.territory-label {
            background: rgba(0, 0, 0, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 10.5px;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 4px;
            white-space: nowrap;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.3px;
            pointer-events: none;
        }
        .leaflet-tooltip.territory-label::before {
            display: none;
        }
        #chrono-submit-btn {
            display: none;
            width: 100%; padding: 10px;
            background: var(--act); color: var(--act-c);
            font-size: 13px; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            margin-bottom: 8px;
            transition: opacity 0.15s;
        }
        #chrono-submit-btn:hover { opacity: 0.85; }

        #chrono-result {
            font-size: 13px; font-weight: bold;
            text-align: center; padding: 6px 4px; min-height: 22px;
            color: rgba(255,255,255,0.9);
        }
        #chrono-result.ok { color: #a5d6a7; }
        #chrono-result.ng { color: #ffb3b0; }

        #chrono-actions {
            display: none;
            flex-direction: column;
            gap: 6px; margin-top: 8px;
        }
        #chrono-actions.visible { display: flex; }
        .chrono-action-btn {
            width: 100%; padding: 9px;
            font-size: 12px; font-weight: bold;
            border-radius: 8px; border: 2px solid;
            cursor: pointer; transition: opacity 0.2s;
        }
        .chrono-action-btn:hover { opacity: 0.8; }
        #chrono-next-btn    { background: var(--act); color: var(--act-c); border-color: var(--act); }
        #chrono-explore-btn { background: transparent; color: var(--act); border-color: var(--act); }

        #chrono-syncro {
            display: none;
            margin-top: 10px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }
        .chrono-syncro-title {
            font-size: 11px; font-weight: bold; color: var(--act);
            margin-bottom: 8px; letter-spacing: 0.5px;
        }
        .chrono-syncro-item {
            margin-bottom: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border-left: 3px solid var(--act);
        }
        .chrono-syncro-year  { font-size: 10px; color: var(--act); font-weight: bold; margin-bottom: 2px; }
        .chrono-syncro-main  { font-size: 11px; font-weight: bold; color: var(--text); margin-bottom: 4px; }
        .chrono-syncro-world { font-size: 11px; line-height: 1.6; color: var(--text); opacity: 0.85; }

        #chrono-lock {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 16px;
            text-align: center;
            gap: 8px;
        }
        #chrono-lock.visible { display: flex; }

        /* ─── 帝国詳細パネル ──────────────────────────── */
        #empire-panel {
            display: none;
            flex-shrink: 0;
            max-height: 60vh;
            overflow-y: auto;
            background: var(--panel);
            border-top: 3px solid var(--act);
            padding: 0 0 12px;
            flex-direction: column;
        }
        #empire-panel.open { display: flex; }

        #empire-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 11px 14px 9px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #empire-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 3px;
        }
        #empire-header-text { flex: 1; }
        #empire-name {
            font-size: 15px;
            font-weight: bold;
            color: var(--text);
            line-height: 1.3;
        }
        #empire-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            margin-top: 2px;
        }
        #empire-close-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.55);
            font-size: 18px;
            cursor: pointer;
            line-height: 1;
            padding: 0 2px;
            flex-shrink: 0;
        }
        #empire-overview {
            font-size: 12px;
            line-height: 1.7;
            color: rgba(255,255,255,0.8);
            padding: 8px 14px 6px;
        }
        #empire-cat-tabs {
            display: flex;
            gap: 5px;
            padding: 4px 12px 6px;
            flex-wrap: wrap;
        }
        .empire-cat-tab {
            font-size: 11px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.15s;
        }
        .empire-cat-tab.active {
            background: var(--act);
            border-color: var(--act);
            color: #fff;
        }
        #empire-policies {
            padding: 4px 14px 8px;
        }
        .policy-card {
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            border-left: 3px solid var(--act);
            padding: 9px 12px;
            margin-bottom: 8px;
        }
        .policy-label {
            font-size: 13px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 4px;
        }
        .policy-detail {
            font-size: 11.5px;
            line-height: 1.65;
            color: rgba(255,255,255,0.78);
            margin-bottom: 7px;
        }
        .policy-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .policy-kw-badge {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(74,144,217,0.22);
            border: 1px solid rgba(74,144,217,0.55);
            color: #7ecfff;
            cursor: default;
        }
        #empire-quiz-btn {
            margin: 0 14px;
            padding: 11px;
            width: calc(100% - 28px);
            background: var(--act);
            color: var(--act-c);
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: 0.3px;
        }
        #empire-quiz-btn:hover { opacity: 0.85; }

        /* ─── 政策比較クイズパネル ─────────────────── */
        #policy-quiz-panel {
            display: none;
            flex-shrink: 0;
            max-height: 60vh;
            overflow-y: auto;
            background: var(--panel);
            border-top: 3px solid var(--act);
            padding: 0 0 14px;
            flex-direction: column;
        }
        #policy-quiz-panel.open { display: flex; }

        #pq-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 14px 9px;
            border-bottom: 2px solid var(--border);
            flex-shrink: 0;
        }
        #pq-empire-name {
            font-size: 13px;
            font-weight: bold;
            color: var(--act);
        }
        #pq-close-btn {
            background: none;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
        }
        #pq-counter {
            font-size: 10px;
            color: rgba(255,255,255,0.55);
            padding: 7px 14px 3px;
        }
        #pq-question {
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            padding: 6px 14px 10px;
            line-height: 1.6;
        }
        #pq-question .pq-target {
            font-size: 10px;
            font-weight: normal;
            color: #7ecfff;
            display: block;
            margin-bottom: 4px;
        }
        #pq-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            padding: 0 14px 8px;
        }
        .pq-choice-btn {
            padding: 10px 8px;
            font-size: 11.5px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            text-align: left;
            line-height: 1.45;
            transition: border-color 0.15s, background 0.15s;
            font-weight: 500;
        }
        .pq-choice-btn:hover:not(:disabled) {
            border-color: var(--act);
            background: rgba(255,255,255,0.14);
        }
        .pq-choice-btn.correct {
            border-color: #66bb6a !important;
            background: rgba(102,187,106,0.25);
            color: #c8f0cb;
            font-weight: bold;
        }
        .pq-choice-btn.wrong {
            border-color: #ef5350 !important;
            background: rgba(239,83,80,0.2);
            color: #ffb3b0;
            opacity: 0.8;
        }
        .pq-choice-btn:disabled { cursor: default; }
        #pq-result {
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            padding: 5px 14px;
            min-height: 20px;
        }
        #pq-result.ok { color: #a5d6a7; }
        #pq-result.ng { color: #ffb3b0; }
        #pq-explanation {
            display: none;
            font-size: 11.5px;
            line-height: 1.7;
            color: rgba(255,255,255,0.8);
            padding: 6px 14px 4px;
            background: rgba(0,0,0,0.18);
            margin: 0 14px;
            border-radius: 8px;
            border-left: 3px solid var(--act);
        }
        #pq-explanation.visible { display: block; }
        #pq-actions {
            display: none;
            flex-direction: column;
            gap: 6px;
            padding: 10px 14px 0;
        }
        #pq-actions.visible { display: flex; }
        #pq-next-btn {
            padding: 10px;
            background: var(--act);
            color: var(--act-c);
            font-size: 12px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #pq-next-btn:hover { opacity: 0.85; }
        #pq-back-btn {
            padding: 9px;
            background: transparent;
            color: var(--act);
            font-size: 12px;
            font-weight: bold;
            border: 2px solid var(--act);
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #pq-back-btn:hover { opacity: 0.8; }

        /* ─── レスポンシブ ─────────────────────────────── */
        @media (max-width: 768px) {
            #wip-banner  { font-size: 11px; padding: 4px 8px; }
            #year-label  { font-size: 15px; }
            #theme-label { font-size: 10px; }
            #info-panel  { height: 30vh; }
            #info-title  { font-size: 14px; }
            #info-detail { font-size: 11px; }
            .pattern-btn { font-size: 10px; padding: 2px 8px; }
            #quiz-panel  { max-height: 50vh; }
            #quiz-question-text { font-size: 12px; }
            #chrono-panel { max-height: 55vh; }
        }
    </style>
</head>
<body>

    <div id="title-bar">
        <h1 id="app-title">🗺️ WorldAtlas</h1>
        <a href="index.html" id="home-btn" style="text-decoration:none;">🏠 ホーム</a>
    </div>

    <div id="mode-tab-bar">
        <a class="mode-tab" href="index.html">📍 Atlas of Historical Sites</a>
        <a class="mode-tab active" href="timeline.html">🔄 Atlas of Syncro Eras <span class="wip-badge">工事中</span></a>
    </div>

    <div id="wip-banner">🚧 開発中です。データ・機能は今後拡充予定！ 🚧</div>

    <!-- Syncro サブタブ -->
    <div id="syncro-sub-tabs">
        <button class="syncro-sub-tab active" id="tab-explore-btn" onclick="switchTab('explore')">🔍 探求モード</button>
        <button class="syncro-sub-tab"        id="tab-quiz-btn"    onclick="switchTab('quiz')">⚡ 同時代クイズ</button>
        <button class="syncro-sub-tab"        id="tab-chrono-btn"  onclick="switchTab('chrono')">🗓️ 並べ替え</button>
    </div>

    <!-- ── 探求モード専用コントロール ─────────────── -->
    <div id="explore-controls">
        <div id="epoch-nav">
            <div id="epoch-nav-top">
                <button class="epoch-arrow" id="epoch-prev" onclick="stepEpoch(-1)" disabled>&#8249;</button>
                <div id="epoch-center">
                    <div id="year-label">読み込み中...</div>
                    <div id="theme-label"></div>
                </div>
                <button class="epoch-arrow" id="epoch-next" onclick="stepEpoch(1)">&#8250;</button>
            </div>
            <div id="epoch-chips"></div>
        </div>
        <div id="pattern-filter">
            <span id="pattern-filter-label">🔍 パターン:</span>
            <button id="territory-toggle-btn" style="display:none;" onclick="toggleTerritories()">🗺️ 版図</button>
        </div>
        <div id="pattern-desc"></div>
    </div>

    <!-- 共有マップ -->
    <div id="tl-map"></div>

    <!-- ── 探求モード：情報パネル ─────────────────── -->
    <div id="info-panel" class="empty">
        <span>マーカーをタップすると詳細が表示されます</span>
    </div>

    <!-- ── 帝国詳細パネル（版図クリック時） ─────── -->
    <div id="empire-panel">
        <div id="empire-header">
            <span id="empire-dot"></span>
            <div id="empire-header-text">
                <div id="empire-name"></div>
                <div id="empire-meta"></div>
            </div>
            <button id="empire-close-btn" onclick="closeEmpirePanel()">✕</button>
        </div>
        <div id="empire-overview"></div>
        <div id="empire-cat-tabs"></div>
        <div id="empire-policies"></div>
        <button id="empire-quiz-btn" onclick="startPolicyQuiz()">📝 政策比較クイズへ</button>
    </div>

    <!-- ── 政策比較クイズパネル（帝国詳細内モーダル） -->
    <div id="policy-quiz-panel">
        <div id="pq-header">
            <span id="pq-empire-name"></span>
            <button id="pq-close-btn" onclick="closePolicyQuiz()">✕ 終了</button>
        </div>
        <div id="pq-counter"></div>
        <div id="pq-question"></div>
        <div id="pq-choices"></div>
        <div id="pq-result"></div>
        <div id="pq-explanation"></div>
        <div id="pq-actions">
            <button id="pq-next-btn" onclick="nextPolicyQuestion()">次の問題へ →</button>
            <button id="pq-back-btn" onclick="closePolicyQuiz()">← 帝国詳細に戻る</button>
        </div>
    </div>

    <!-- ── 年号並べ替えパネル ─────────────────────── -->
    <div id="chrono-panel">
        <!-- ログイン未確認時のロック表示 -->
        <div id="chrono-lock">
            <div style="font-size:2em;">🔒</div>
            <div style="font-weight:bold; font-size:14px;">受験生登録で解放</div>
            <div style="font-size:12px; opacity:0.7;">
                <a href="index.html" style="color:var(--act);">ホームでログイン</a>してからご利用ください
            </div>
        </div>
        <!-- 本体 -->
        <div id="chrono-inner">
            <div id="chrono-region-btns">
                <button class="chrono-region-btn active" data-region="all">🌍 おまかせ</button>
                <button class="chrono-region-btn" data-region="europe">欧州</button>
                <button class="chrono-region-btn" data-region="mideast">中東</button>
                <button class="chrono-region-btn" data-region="africa">アフリカ</button>
                <button class="chrono-region-btn" data-region="india">インド</button>
                <button class="chrono-region-btn" data-region="china">中国</button>
                <button class="chrono-region-btn" data-region="southeast_asia">東南アジア</button>
                <button class="chrono-region-btn" data-region="latin_america">南米</button>
                <button class="chrono-region-btn" data-region="world_wars">大戦期</button>
            </div>
            <div id="chrono-hint">古い順（1→4）にタップしよう</div>
            <div id="chrono-cards"></div>
            <button id="chrono-submit-btn">✅ 答え合わせ</button>
            <div id="chrono-result"></div>
            <div id="chrono-actions">
                <button class="chrono-action-btn" id="chrono-explore-btn">🔍 このエポックをSyncro Erasで確認</button>
                <button class="chrono-action-btn" id="chrono-next-btn">次の問題へ →</button>
            </div>
            <div id="chrono-syncro"></div>
        </div>
    </div>

    <!-- ── 同時代クイズパネル ─────────────────────── -->
    <div id="quiz-panel">
        <div id="quiz-counter">
            <span id="quiz-counter-text">問題 1</span>
            <span id="quiz-streak"></span>
        </div>
        <div id="quiz-question-text"></div>
        <div id="quiz-choices"></div>
        <div id="quiz-result"></div>
        <div id="quiz-actions">
            <button class="quiz-action-btn" id="quiz-explore-btn">🔍 このエポックを探求モードで確認する</button>
            <button class="quiz-action-btn" id="quiz-next-btn">次の問題へ →</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // ── パターン定義 ─────────────────────────────────────────
    const PATTERNS = {
        '交易で栄えた':       { color: '#ffd54f', desc: '交易路を押さえた勢力が繁栄する。金・香辛料・銀・塩など「何が動いたか」が覇権を決めた。共テ頻出：なぜ栄えたかの共通因子。' },
        '外圧が改革を生む':   { color: '#80cbc4', desc: '外からの脅威（征服・侵攻・文化流入）が内側の変革を加速させる。ペルシア戦争→民主政、アヘン戦争→洋務運動と同じ構造。' },
        '帝国の拡大と崩壊':   { color: '#ef9a9a', desc: '拡大しすぎた帝国は必ず内部矛盾・外圧で崩壊する。ローマ・モンゴル・唐・アッバース朝…時代・地域を超えて繰り返される。' },
        '宗教が統治を支えた': { color: '#ce93d8', desc: '宗教が権力の正統性を担保する。アショーカ王の仏教、フランクのキリスト教、イスラームのカリフ制…支配に神の権威が必要だった。' },
        '知の革命':           { color: '#4fc3f7', desc: '政治的激動期に哲学・宗教・科学が爆発的に生まれる。春秋戦国・ギリシア・ルネサンス・宗教改革…「枢軸の時代」の普遍的パターン。' },
    };

    const REGION_COLORS = {
        europe: '#4fc3f7', mideast: '#ffb74d', africa: '#81c784',
        india: '#ce93d8', china: '#ef9a9a', southeast_asia: '#80cbc4',
        north_america: '#fff176', latin_america: '#f48fb1',
    };
    const REGION_NAMES = {
        europe: 'ヨーロッパ', mideast: '中東', africa: 'アフリカ',
        india: 'インド', china: '中国', southeast_asia: '東南アジア',
        north_america: '北アメリカ', latin_america: 'ラテンアメリカ',
    };

    // ── 地図初期化 ──────────────────────────────────────────
    const map = L.map('tl-map', { center: [30, 20], zoom: 2, minZoom: 1, maxZoom: 6 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors', opacity: 0.55,
    }).addTo(map);
    document.getElementById('tl-map').style.background =
        'linear-gradient(-45deg, #0d1b2a, #1a3a5c, #16213e, #0d1b2a)';

    let timelineData    = [];
    let markerLayer     = L.layerGroup().addTo(map);
    let quizLayer       = L.layerGroup().addTo(map);
    let territoryLayer  = L.layerGroup().addTo(map);
    let activePattern   = null;
    let currentIdx      = 0;
    let showTerritories = true;

    // ── タブ切替 ─────────────────────────────────────────────
    let currentTab = 'explore';

    function switchTab(tab) {
        currentTab = tab;
        const exploreBtn  = document.getElementById('tab-explore-btn');
        const quizBtn     = document.getElementById('tab-quiz-btn');
        const chronoBtn   = document.getElementById('tab-chrono-btn');
        const exploreCtrl = document.getElementById('explore-controls');
        const infoPanel   = document.getElementById('info-panel');
        const quizPanel   = document.getElementById('quiz-panel');
        const chronoPanel = document.getElementById('chrono-panel');

        [exploreBtn, quizBtn, chronoBtn].forEach(b => b.classList.remove('active'));

        if (tab === 'explore') {
            exploreBtn.classList.add('active');
            exploreCtrl.style.display = 'contents';
            infoPanel.style.display   = '';
            quizPanel.classList.remove('active');
            chronoPanel.classList.remove('active');
            markerLayer.addTo(map);
            quizLayer.clearLayers();
            renderEpoch(currentIdx);
        } else if (tab === 'quiz') {
            quizBtn.classList.add('active');
            exploreCtrl.style.display = 'none';
            infoPanel.style.display   = 'none';
            quizPanel.classList.add('active');
            chronoPanel.classList.remove('active');
            markerLayer.clearLayers();
            startQuizQuestion();
        } else {
            chronoBtn.classList.add('active');
            exploreCtrl.style.display = 'none';
            infoPanel.style.display   = 'none';
            quizPanel.classList.remove('active');
            chronoPanel.classList.add('active');
            markerLayer.clearLayers();
            initChronoPanel();
        }
        setTimeout(() => map.invalidateSize(), 50);
    }

    // ── パターンボタン生成（探求モード） ──────────────────────
    function buildPatternButtons() {
        const container = document.getElementById('pattern-filter');
        Object.entries(PATTERNS).forEach(([name, def]) => {
            const btn = document.createElement('button');
            btn.className   = 'pattern-btn';
            btn.textContent = name;
            btn.style.background   = def.color + '33';
            btn.style.borderColor  = def.color;
            btn.style.color        = def.color;
            btn.dataset.pattern    = name;
            btn.addEventListener('click', () => togglePattern(name, btn));
            container.appendChild(btn);
        });
    }

    function togglePattern(name, btn) {
        const allBtns = document.querySelectorAll('.pattern-btn');
        const descEl  = document.getElementById('pattern-desc');
        if (activePattern === name) {
            activePattern = null;
            allBtns.forEach(b => b.classList.remove('active'));
            descEl.classList.remove('visible');
            descEl.textContent = '';
        } else {
            activePattern = name;
            allBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const def = PATTERNS[name];
            descEl.style.borderColor = def.color;
            descEl.style.color       = def.color;
            descEl.textContent       = `📌 ${name}：${def.desc}`;
            descEl.classList.add('visible');
        }
        renderEpoch(currentIdx);
    }

    // ── 探求モード：年代描画 ─────────────────────────────────
    function renderEpoch(idx) {
        currentIdx = idx;
        const epoch = timelineData[idx];
        if (!epoch) return;

        document.getElementById('year-label').textContent  = epoch.label;
        document.getElementById('theme-label').textContent = epoch.theme;
        markerLayer.clearLayers();
        resetInfoPanel();
        updateEpochNav(idx);
        // エポック変更時は帝国パネルを閉じる
        document.getElementById('empire-panel')?.classList.remove('open');
        document.getElementById('policy-quiz-panel')?.classList.remove('open');
        document.getElementById('info-panel').style.display = '';

        // ── 版図レイヤー ────────────────────────────────────────
        territoryLayer.clearLayers();
        document.getElementById('territory-legend')?.remove();
        if (epoch.territoriesFile && showTerritories) {
            loadTerritoryLayer(epoch);
        }
        // トグルボタンの表示切り替え
        const tBtn = document.getElementById('territory-toggle-btn');
        if (tBtn) tBtn.style.display = epoch.territoriesFile ? 'inline-block' : 'none';

        epoch.events.forEach(ev => {
            const isHighlighted = !activePattern || (ev.patterns || []).includes(activePattern);
            const baseColor = REGION_COLORS[ev.region] || '#4a90d9';
            const opacity   = isHighlighted ? 1 : 0.2;
            const size      = isHighlighted && activePattern ? 26 : 20;
            const glow      = isHighlighted && activePattern
                ? `box-shadow:0 0 10px 4px ${PATTERNS[activePattern]?.color || baseColor},0 2px 8px rgba(0,0,0,0.5);`
                : 'box-shadow:0 2px 6px rgba(0,0,0,0.4);';

            const icon = L.divIcon({
                className: '',
                html: `<div style="
                    background:${baseColor};border:3px solid #fff;border-radius:50%;
                    width:${size}px;height:${size}px;opacity:${opacity};${glow}
                    cursor:pointer;transition:all 0.2s;
                "></div>`,
                iconSize:   [size, size],
                iconAnchor: [size / 2, size / 2],
            });
            const marker = L.marker([ev.lat, ev.lng], { icon }).addTo(markerLayer);
            if (isHighlighted) marker.on('click', () => showInfo(ev, baseColor));
        });
    }

    async function loadTerritoryLayer(epoch) {
        try {
            const res  = await fetch(`./data/historical_borders/${epoch.territoriesFile}.geojson`);
            const geoj = await res.json();
            const colorMap = epoch.colorMap || [];

            function getStyle(feature) {
                const name  = feature.properties?.name || '';
                const entry = colorMap.find(c => name.includes(c.match));
                const color = entry ? entry.color : '#888888';
                return {
                    color:       color,
                    weight:      1.5,
                    opacity:     0.7,
                    fillColor:   color,
                    fillOpacity: 0.18,
                };
            }

            L.geoJSON(geoj, {
                style:        getStyle,
                onEachFeature(feature, layer) {
                    const name  = feature.properties?.name || '';
                    const entry = colorMap.find(c => name.includes(c.match));
                    if (!entry) return;
                    // 括弧の前だけを短縮ラベルとして常時表示
                    const shortLabel = entry.label.split('（')[0].split('(')[0].trim();
                    layer.bindTooltip(shortLabel, {
                        permanent:  true,
                        direction:  'center',
                        className:  'territory-label',
                        opacity:    1,
                    });
                    // 帝国詳細パネルを開く
                    const empires = epoch.empires || [];
                    const empire  = empires.find(em => name.includes(em.match));
                    if (empire) {
                        layer.on('click', () => showEmpireDetail(empire, entry.color, epoch));
                        layer.getElement?.()?.style?.setProperty('cursor', 'pointer');
                    }
                },
            }).addTo(territoryLayer);

            // 凡例を追加
            buildTerritoryLegend(colorMap, epoch.territoriesYear);
        } catch (e) {
            console.warn('版図GeoJSON読み込み失敗:', e);
        }
    }

    function toggleTerritories() {
        showTerritories = !showTerritories;
        const btn = document.getElementById('territory-toggle-btn');
        btn.textContent = showTerritories ? '🗺️ 版図を隠す' : '🗺️ 版図を表示';
        if (showTerritories) {
            loadTerritoryLayer(timelineData[currentIdx]);
        } else {
            territoryLayer.clearLayers();
            document.getElementById('territory-legend')?.remove();
        }
    }

    function buildTerritoryLegend(colorMap, year) {
        const existing = document.getElementById('territory-legend');
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.id = 'territory-legend';
        div.innerHTML = `
            <div class="tl-title">🗺️ ${year}年頃の版図</div>
            ${colorMap.map(c => `
                <div class="tl-item">
                    <span class="tl-color" style="background:${c.color}"></span>
                    ${c.label}
                </div>`).join('')}
        `;
        document.getElementById('tl-map').appendChild(div);
    }

    // ════════════════════════════════════════════════════════
    // 帝国詳細パネル
    // ════════════════════════════════════════════════════════
    let currentEmpire = null;
    let currentEpochForQuiz = null;
    let activeCat = null;

    function showEmpireDetail(empire, color, epoch) {
        currentEmpire       = empire;
        currentEpochForQuiz = epoch;

        // ヘッダー
        const dot = document.getElementById('empire-dot');
        dot.style.background = color;
        dot.style.boxShadow  = `0 0 8px ${color}99`;
        document.getElementById('empire-name').textContent =
            empire.name + (empire.period ? `  (${empire.period})` : '');
        const meta = [];
        if (empire.founder) meta.push('創始者：' + empire.founder);
        if (empire.capital) meta.push('首都：' + empire.capital);
        document.getElementById('empire-meta').textContent = meta.join(' ／ ');
        document.getElementById('empire-overview').textContent = empire.overview || '';

        // カテゴリータブを生成（重複排除）
        const cats = [...new Set((empire.policies || []).map(p => p.category))];
        activeCat  = cats[0] || null;
        const tabsEl = document.getElementById('empire-cat-tabs');
        tabsEl.innerHTML = '';
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className   = `empire-cat-tab${cat === activeCat ? ' active' : ''}`;
            btn.textContent = cat;
            btn.dataset.cat = cat;
            btn.addEventListener('click', () => {
                activeCat = cat;
                tabsEl.querySelectorAll('.empire-cat-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderPolicyCards(empire, cat, color);
            });
            tabsEl.appendChild(btn);
        });

        renderPolicyCards(empire, activeCat, color);

        // クイズボタンの表示制御
        const hasQuiz = (empire.quizStatements || []).filter(s => s.correct).length > 0;
        document.getElementById('empire-quiz-btn').style.display = hasQuiz ? 'block' : 'none';

        // パネルを開く
        document.getElementById('info-panel').style.display = 'none';
        document.getElementById('policy-quiz-panel').classList.remove('open');
        document.getElementById('empire-panel').classList.add('open');
    }

    function renderPolicyCards(empire, cat, color) {
        const container = document.getElementById('empire-policies');

    function generatePolicyQuizQuestion(epoch, empire) {
        // 正解選択肢：クリックした帝国の correct: true のステートメント
        const correctPool = (empire.quizStatements || []).filter(s => s.correct);
        if (!correctPool.length) return null;
        const correctStmt = correctPool[Math.floor(Math.random() * correctPool.length)];

        // 誤り選択肢：同エポック内の他帝国の correct: true ステートメント
        const otherEmpires = (epoch.empires || []).filter(em => em.match !== empire.match);
        const decoyPool = otherEmpires.flatMap(em =>
            (em.quizStatements || [])
                .filter(s => s.correct)
                .map(s => ({ ...s, _fromEmpire: em.name || em.match }))
        );

        // 3問分の誤り選択肢をシャッフルして選ぶ。足りない場合は全問使用
        const shuffledDecoys = [...decoyPool].sort(() => Math.random() - 0.5);
        const decoys = shuffledDecoys.slice(0, 3);

        if (decoys.length === 0) return null;

        const choices = [
            { statement: correctStmt.statement, isCorrect: true, explanation: correctStmt.explanation },
            ...decoys.map(d => ({ statement: d.statement, isCorrect: false, explanation: `これは「${d._fromEmpire}」の説明です。` })),
        ].sort(() => Math.random() - 0.5);

        return {
            targetName: empire.name || empire.match,
            choices,
        };
    }

    function answerPolicyQuiz(choice, clickedBtn) {

            resultEl.className   = 'ok';
        } else {
            clickedBtn.classList.add('wrong');
            document.querySelectorAll('.pq-choice-btn').forEach(b => {
                const bData = pqCurrent.choices.find(c => c.statement === b.textContent);
                if (bData?.isCorrect) b.classList.add('correct');
            });
            resultEl.textContent = '❌ 不正解。';
            resultEl.className   = 'ng';
        }

        expEl.textContent = choice.explanation || '';
        expEl.classList.add('visible');

        document.getElementById('pq-counter').textContent =
            `問題 ${pqTotal}　正解 ${pqScore} / ${pqTotal}`;
        document.getElementById('pq-actions').classList.add('visible');
    }

    // ── 同時代クイズ ─────────────────────────────────────────
    let quizScore   = 0;
    let quizTotal   = 0;
    let quizStreak  = 0;
    let currentQ    = null;

    function generateQuestion() {
        const valid = timelineData.filter(e => e.events.length >= 2);
        const epoch = valid[Math.floor(Math.random() * valid.length)];

        // 出題イベント（seed）
        const seedIdx   = Math.floor(Math.random() * epoch.events.length);
        const seedEvent = epoch.events[seedIdx];

        // 正解イベント（同エポック・別地域）
        const correctCandidates = epoch.events.filter((_, i) => i !== seedIdx);
        const correctEvent = correctCandidates[Math.floor(Math.random() * correctCandidates.length)];

        // 不正解3つ（他エポックからランダム）
        const otherEvents = timelineData
            .filter(e => e.year !== epoch.year)
            .flatMap(e => e.events)
            .sort(() => Math.random() - 0.5)
            .slice(0, 3);

        const choices = [
            { event: correctEvent, isCorrect: true },
            ...otherEvents.map(e => ({ event: e, isCorrect: false })),
        ].sort(() => Math.random() - 0.5);

        return { epoch, seedEvent, correctEvent, choices };
    }

    function startQuizQuestion() {
        currentQ = generateQuestion();
        const q  = currentQ;
        const seedRegion    = REGION_NAMES[q.seedEvent.region]    || q.seedEvent.region;
        const correctRegion = REGION_NAMES[q.correctEvent.region] || q.correctEvent.region;

        document.getElementById('quiz-counter-text').textContent =
            `問題 ${quizTotal + 1}　正解 ${quizScore} / ${quizTotal}`;
        document.getElementById('quiz-streak').textContent =
            quizStreak >= 2 ? `🔥 ${quizStreak}連続正解！` : '';

        document.getElementById('quiz-question-text').innerHTML =
            `<span class="hint">⏱ ${q.epoch.label}</span>` +
            `<strong>${seedRegion}</strong>で<br>` +
            `「${q.seedEvent.title}」<br>` +
            `が起きていた頃、<strong>${correctRegion}</strong>では？`;

        const choicesEl = document.getElementById('quiz-choices');
        choicesEl.innerHTML = '';
        q.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className   = 'quiz-choice-btn';
            btn.textContent = choice.event.title;
            btn.onclick     = () => answerQuiz(choice, btn);
            choicesEl.appendChild(btn);
        });

        document.getElementById('quiz-result').textContent = '';
        document.getElementById('quiz-result').className   = '';
        document.getElementById('quiz-actions').classList.remove('visible');

        // マップ：出題イベントをピン表示

    }

    function answerQuiz(choice, clickedBtn) {

            });
            resultEl.textContent = `❌ 不正解。正解：「${currentQ.correctEvent.title}」（${currentQ.epoch.label}・${REGION_NAMES[currentQ.correctEvent.region] || ''}）`;
            resultEl.className   = 'ng';
        }

        document.getElementById('quiz-counter-text').textContent =
            `問題 ${quizTotal}　正解 ${quizScore} / ${quizTotal}`;
        document.getElementById('quiz-streak').textContent =

    function showQuizEpochMarkers(epoch) {
        quizLayer.clearLayers();
        epoch.events.forEach(ev => {
            const color   = REGION_COLORS[ev.region] || '#4a90d9';

            const size    = (isSeed || isAns) ? 26 : 16;

    // ── 年号並べ替えクイズ ───────────────────────────────────
    let chronoData    = {};   // region key → [{text, year, lat, lng, _region}, ...]
    let chronoLoaded  = false;
    let chronoCards   = [];   // 現在の4問（シャッフル済み表示順）
    let chronoOrder   = [];   // ユーザーがタップした順のインデックス配列
    let selectedRegion = 'all';
    let chronoCorrectCards = null; // 正解順

    async function loadChronoData() {
        if (chronoLoaded) return;
        const regions = ['europe','mideast','africa','india','china','southeast_asia',
                         'north_america','latin_america','world_wars','cold_war'];
        const results = await Promise.all(
            regions.map(r => fetch(`data/${r}.json`).then(res => res.json()))
        );
        regions.forEach((r, i) => {
            const qs = [];
            Object.values(results[i].eras).forEach(era => {
                (era.fixed || []).forEach(q => {
                    if (q.year !== undefined && q.text && q.lat !== undefined) {
                        qs.push({ text: q.text, sortLabel: q.sortLabel, year: q.year, lat: q.lat, lng: q.lng, _region: r });
                    }
                });
            });
            chronoData[r] = qs;
        });
        chronoLoaded = true;
    }

    function pickChronoQuestions(region) {
        let pool = region === 'all'
            ? Object.values(chronoData).flat()
            : (chronoData[region] || []);
        if (pool.length < 4) return null;

        // 100回試行して年代差が十分な4問を選ぶ
        for (let i = 0; i < 150; i++) {
            const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, 4);
            shuffled.sort((a, b) => a.year - b.year);
            const span  = shuffled[3].year - shuffled[0].year;
            const minGap = Math.min(
                shuffled[1].year - shuffled[0].year,
                shuffled[2].year - shuffled[1].year,
                shuffled[3].year - shuffled[2].year
            );
            if (span >= 300 && minGap >= 50) return shuffled;
        }
        // フォールバック：均等サンプリング
        const sorted = [...pool].sort((a, b) => a.year - b.year);
        const n = sorted.length;
        return [sorted[0], sorted[Math.floor(n/3)], sorted[Math.floor(n*2/3)], sorted[n-1]];
    }

    function yearText(y) {
        return y < 0 ? `BC${Math.abs(y)}年` : `${y}年`;
    }

    async function initChronoPanel() {
        const isLoggedIn = !!localStorage.getItem('quiz_current_user');
        const lockEl     = document.getElementById('chrono-lock');
        const innerEl    = document.getElementById('chrono-inner');
        if (!isLoggedIn) {
            lockEl.classList.add('visible');
            innerEl.style.display = 'none';
            return;
        }
        lockEl.classList.remove('visible');
        innerEl.style.display = '';
        await loadChronoData();
        startChronoQuiz();
    }

    function startChronoQuiz() {
        const questions = pickChronoQuestions(selectedRegion);
        if (!questions) {
            document.getElementById('chrono-cards').innerHTML =
                '<p style="color:var(--act);text-align:center">この地域の問題が不足しています。「おまかせ」を選んでください。</p>';
            return;
        }
        // 正解順を保存しておく（year昇順）
        chronoCorrectCards = questions; // already sorted by year
        // 表示順はシャッフル
        chronoCards = [...questions].sort(() => Math.random() - 0.5);
        chronoOrder = [];

        document.getElementById('chrono-result').textContent    = '';
        document.getElementById('chrono-result').className      = '';
        document.getElementById('chrono-actions').classList.remove('visible');
        document.getElementById('chrono-syncro').style.display  = 'none';
        document.getElementById('chrono-submit-btn').style.display = 'none';
        document.getElementById('chrono-hint').textContent = '古い順（1→4）にタップしよう';

        renderChronoCards(false);
        quizLayer.clearLayers();
    }

    function renderChronoCards(showResult) {
        const container = document.getElementById('chrono-cards');
        container.innerHTML = '';

        if (showResult) {
            // 正解順（year昇順）で並べて表示
            chronoCorrectCards.forEach((q, pos) => {
                const userPos   = chronoOrder.findIndex(idx => chronoCards[idx] === q);
                const isCorrect = userPos === pos;

                const card = document.createElement('div');
                card.className = `chrono-card ${isCorrect ? 'result-correct' : 'result-wrong'}`;

                const badge = document.createElement('div');
                badge.className = `chrono-badge ${isCorrect ? 'badge-ok' : 'badge-ng'}`;
                badge.textContent = pos + 1;

                const textDiv = document.createElement('div');
                textDiv.className = 'chrono-card-text';
                textDiv.innerHTML = `${q.sortLabel || q.text}<br><span class="chrono-year-badge">${yearText(q.year)}</span>`;

                card.appendChild(badge);
                card.appendChild(textDiv);

                if (!isCorrect) {
                    const userSpan = document.createElement('div');
                    userSpan.className   = 'chrono-user-pos';
                    userSpan.textContent = `あなた: ${userPos + 1}番`;
                    card.appendChild(userSpan);
                }
                container.appendChild(card);
            });
        } else {
            chronoCards.forEach((q, i) => {
                const orderPos   = chronoOrder.indexOf(i);
                const isSelected = orderPos >= 0;

                const card = document.createElement('div');
                card.className = `chrono-card${isSelected ? ' selected' : ''}`;
                card.addEventListener('click', () => toggleChronoCard(i));

                const badge = document.createElement('div');
                badge.className  = `chrono-badge${isSelected ? ' filled' : ''}`;
                badge.textContent = isSelected ? orderPos + 1 : '';

                const textDiv = document.createElement('div');
                textDiv.className   = 'chrono-card-text';
                textDiv.textContent = q.sortLabel || q.text;

                card.appendChild(badge);
                card.appendChild(textDiv);
                container.appendChild(card);
            });
        }
    }

    function toggleChronoCard(idx) {
        const pos = chronoOrder.indexOf(idx);
        if (pos >= 0) {
            chronoOrder.splice(pos, 1);
        } else if (chronoOrder.length < 4) {
            chronoOrder.push(idx);
        }
        renderChronoCards(false);
        const submitBtn = document.getElementById('chrono-submit-btn');
        submitBtn.style.display = chronoOrder.length === 4 ? 'block' : 'none';
    }

    function checkChronoAnswer() {
        // chronoOrder[pos] = chronoCards のインデックス → そのyearで検証
        const correctOrder = chronoCorrectCards; // year昇順
        let correctCount = 0;
        chronoOrder.forEach((cardIdx, userPos) => {
            if (chronoCards[cardIdx] === correctOrder[userPos]) correctCount++;
        });

        renderChronoCards(true);

        const resultEl = document.getElementById('chrono-result');
        const isAllCorrect = correctCount === 4;
        if (isAllCorrect) {
            resultEl.textContent = '✅ 完全正解！時代の流れを完璧に掴んでいます！';
            resultEl.className   = 'ok';
        } else {
            resultEl.textContent = `${correctCount}/4問正しい位置でした。年号を確認しよう！`;
            resultEl.className   = 'ng';
        }

        document.getElementById('chrono-submit-btn').style.display = 'none';
        document.getElementById('chrono-actions').classList.add('visible');

        showChronoSyncro(correctOrder);
        showChronoMapMarkers(correctOrder);
    }

    function showChronoSyncro(orderedQuestions) {
        const el = document.getElementById('chrono-syncro');
        el.style.display = 'block';

        const html = orderedQuestions.map(q => {
            if (!timelineData.length) return '';
            const epoch = timelineData.reduce((best, e) =>
                Math.abs(e.year - q.year) < Math.abs(best.year - q.year) ? e : best
            );
            const others = epoch.events.filter(ev => ev.region !== q._region).slice(0, 2);
            if (!others.length) return '';
            const othersHtml = others.map(ev => {
                const c = REGION_COLORS[ev.region] || '#aaa';
                return `<span style="color:${c}">${REGION_NAMES[ev.region] || ev.region}：${ev.title}</span>`;
            }).join(' ・ ');
            return `<div class="chrono-syncro-item">
                <div class="chrono-syncro-year">${yearText(q.year)}ごろ ／ ${epoch.label}</div>
                <div class="chrono-syncro-main">${q.text.split('(')[0].trim()}</div>
                <div class="chrono-syncro-world">🔄 同じ頃 → ${othersHtml}</div>
            </div>`;
        }).filter(Boolean).join('');

        el.innerHTML = `<div class="chrono-syncro-title">🌐 Syncro — この時代の世界では</div>${html || '<p style="opacity:0.5;font-size:11px">接続情報なし</p>'}`;
    }

    function showChronoMapMarkers(orderedQuestions) {
        quizLayer.clearLayers();
        const bounds = [];
        orderedQuestions.forEach((q, pos) => {
            if (q.lat === undefined) return;
            const color = REGION_COLORS[q._region] || '#4a90d9';
            const icon  = L.divIcon({
                className: '',
                html: `<div style="
                    background:${color};border:2px solid #fff;border-radius:50%;
                    width:28px;height:28px;
                    display:flex;align-items:center;justify-content:center;
                    font-size:12px;font-weight:bold;color:#000;
                    box-shadow:0 2px 8px rgba(0,0,0,0.45);
                ">${pos + 1}</div>`,
                iconSize: [28, 28], iconAnchor: [14, 14],
            });
            L.marker([q.lat, q.lng], { icon }).addTo(quizLayer);
            bounds.push([q.lat, q.lng]);
        });
        if (bounds.length > 1) map.flyToBounds(bounds, { padding: [50, 50], duration: 1.0 });
    }

    // 地域ボタンのクリック処理

        banner.innerHTML = `
            <span>🔄 Atlasからジャンプ：</span>
            <strong style="color:#fff">${fromText}</strong>
            ${pattern ? `<span style="color:${patternColor};font-weight:bold;">→ ${pattern}</span>` : ''}
            <button onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;color:var(--text);cursor:pointer;font-size:16px;line-height:1;">✕</button>
        `;
        document.getElementById('wip-banner').insertAdjacentElement('afterend', banner);
    }

    // ── エポックチップ更新 ───────────────────────────────────
    function updateEpochNav(idx) {
        // チップ
        document.querySelectorAll('.epoch-chip').forEach((c, i) => {
            c.classList.toggle('active', i === idx);
            if (i === idx) c.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
        // 矢印ボタン
        document.getElementById('epoch-prev').disabled = idx <= 0;
        document.getElementById('epoch-next').disabled = idx >= timelineData.length - 1;
    }

    function stepEpoch(delta) {
        const next = Math.max(0, Math.min(timelineData.length - 1, currentIdx + delta));
        renderEpoch(next);
    }

    // ── データ読み込み ────────────────────────────────────────
    fetch('data/timeline.json')
        .then(r => r.json())
        .then(data => {
            timelineData = data;

            // チップを生成
            const chipsEl = document.getElementById('epoch-chips');
            data.forEach((epoch, i) => {
                const chip = document.createElement('button');
                chip.className = 'epoch-chip';
                chip.textContent = epoch.label;
                chip.addEventListener('click', () => renderEpoch(i));
                chipsEl.appendChild(chip);
            });

            buildPatternButtons();
            renderEpoch(0);

            const params       = new URLSearchParams(window.location.search);
            const fromParam    = params.get('from');
            const patternParam = params.get('pattern');

            if (fromParam) showJumpBanner(fromParam, patternParam);

            if (patternParam) {
                const btn = document.querySelector(`.pattern-btn[data-pattern="${patternParam}"]`);
                if (btn) togglePattern(patternParam, btn);
            }
        })
        .catch(() => {
            document.getElementById('theme-label').textContent = 'データ読み込みに失敗しました';
        });
    </script>
</body>
</html>
